<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extrator CRM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{--teal:#013b47;--teal2:#014d5c;--gold:#d2ad74;--white:#fff;--bg:#f4f4f2;--surface:#fff;--border:#e8e8e5;--text:#1a1a1a;--muted:#8a8a82;--green:#2d7a4f;--red:#c0392b;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.hdr{background:var(--teal);padding:14px 32px;display:flex;align-items:center;gap:14px}
.hdr img{width:52px;height:52px;object-fit:contain;flex-shrink:0;display:block}
.hdr-text h1{font-size:17px;font-weight:600;color:#fff;letter-spacing:-.2px}
.hdr-text p{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
.main{max-width:880px;margin:0 auto;padding:28px 20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px;margin-bottom:14px}
.section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.divider{border-top:1px solid var(--border);margin:18px -22px;padding-top:18px;padding-left:22px;padding-right:22px}
.field{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px}
input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;padding:10px 13px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--teal);background:#fff;box-shadow:0 0 0 3px rgba(1,59,71,.08)}
input::placeholder{color:#bbb}
input[type="date"]{color:#bbb}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--teal);color:#fff}.btn-primary:hover{background:var(--teal2)}.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{filter:brightness(1.08)}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--teal);color:var(--teal)}
.btn-sm{padding:7px 14px;font-size:12px}
.flex-gap{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:9px;margin-top:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#fafaf8;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px 16px;flex:1;min-width:90px}
.stat-v{font-size:22px;font-weight:700;color:var(--teal);line-height:1}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px}
.log{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:12px 16px;font-size:13px;color:var(--red);margin-top:14px;display:none}
.badge-multi{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;background:var(--gold);color:#fff;border-radius:50%;font-size:8px;font-weight:700;cursor:pointer;margin-right:4px;vertical-align:middle;transition:transform .15s}
.badge-multi:hover{transform:scale(1.2)}
.toggle-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid var(--border);border-radius:7px;background:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .2s}
.toggle-btn.active{background:#eef7f2;border-color:#b8dcc8;color:var(--green)}
.toggle-btn .dot{width:32px;height:18px;border-radius:9px;background:#ddd;position:relative;transition:background .2s;flex-shrink:0}
.toggle-btn .dot::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-btn.active .dot{background:var(--green)}
.toggle-btn.active .dot::after{left:16px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:28px;max-width:800px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px}
.modal-title{font-size:16px;font-weight:700;color:var(--teal)}
.modal-sub{font-size:12px;color:var(--muted);margin-top:3px}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:0;line-height:1}
.modal-close:hover{color:var(--text)}
.cert-card{background:#fafaf8;border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px}
.cert-card:last-child{margin-bottom:0}
.cert-num{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:.5px;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;display:inline-block}
.hidden{display:none!important}
.mt14{margin-top:14px}
.hint{font-size:11px;color:var(--muted);margin-top:4px;display:none}
@media(max-width:580px){.row2,.row3{grid-template-columns:1fr}}
</style>
</head>

<script>
const API = 'https://siscnrm-backend.onrender.com';
let S = {instId:'',instNm:'',progId:'',progNm:''};
let rows = [], rowsOriginal = [];
const crmCache = {}, crmMulti = {};
let multiRows = {};
let filtroInstAtivo = false;
let crmVerificandoTotal = 0, crmVerificandoConcluido = 0;
const contatoCache = {};  // crm -> {telefone, email, nome}
let didEmail = '', didSenha = '';

function fmt(v){ if(!v) return ''; const [y,m,d]=v.split('-'); return `${d}/${m}/${y}`; }
function parseDateBR(s){ if(!s) return new Date(0); const [d,m,y]=s.split('/'); return new Date(+y,+m-1,+d); }

// ── Carregar Instituições ────────────────────────────────────────────────────
let _instituicoes = [];
let _programas = [];       // programas da instituição selecionada
let _programas_uf = [];    // programas únicos da UF (sem instituição)
let _prog_combos = {};     // nome -> lista de combos {inst_id, prog_id}

async function carregarInstituicoes() {
  const uf = document.getElementById('ex-uf').value;
  const instInput = document.getElementById('ex-inst-input');
  const instSel   = document.getElementById('ex-inst-sel');
  const progSel   = document.getElementById('ex-prog-sel');
  // Reset
  _instituicoes = [];
  _programas = [];
  instInput.value = ''; instInput.disabled = true; instInput.placeholder = 'Nome parcial...';
  instInput.style.color = '#bbb';
  instSel.value = '';
  const progInput = document.getElementById('ex-prog-input');
  progInput.value = ''; progInput.disabled = true; progInput.style.color = '#bbb';
  document.getElementById('ex-prog-sel').value = '';
  S.instId = ''; S.instNm = ''; S.progId = ''; S.progNm = '';
  if (!uf) return;
  instInput.placeholder = 'Carregando...';
  try {
    const r = await fetch(`${API}/instituicoes/${uf}`);
    const d = await r.json();
    _instituicoes = d;
    instInput.placeholder = 'Nome parcial...';
    instInput.disabled = false;
    instInput.style.color = '';
    // Carrega programas da UF em paralelo (sem instituição)
    carregarProgramasUF(uf);
  } catch(e) { instInput.placeholder = 'Erro ao carregar'; }
}

async function carregarProgramasUF(uf) {
  _programas_uf = [];
  _prog_combos = {};
  if (!uf) return;
  try {
    const r = await fetch(`${API}/programas_uf/${uf}`);
    const d = await r.json();
    _programas_uf = d;
    d.forEach(p => { _prog_combos[p.nome] = p.combos; });
    // Se nenhuma instituição selecionada, popula o dropdown de programas com nomes únicos
    const instId = document.getElementById('ex-inst-sel').value;
    if (!instId) {
      _programas = d.map(p => ({ id: '__uf__', nome: p.nome }));
      // Mantém o campo habilitado para busca por programa
      const progInput = document.getElementById('ex-prog-input');
      if (progInput) { progInput.disabled = false; progInput.style.color = ''; }
    }
  } catch(e) { console.log('Erro ao carregar programas da UF:', e); }
}

function filtrarInstituicoes() {
  const q = document.getElementById('ex-inst-input').value.toLowerCase().trim();
  const dd = document.getElementById('ex-inst-dropdown');
  // Se limpou o campo, reseta seleção
  if (!q) {
    dd.style.display = 'none';
    document.getElementById('ex-inst-sel').value = '';
    S.instId = ''; S.instNm = '';
    document.getElementById('ex-prog-sel').innerHTML = '<option value="" style="color:#bbb">Todos os Programas</option>';
    document.getElementById('ex-prog-sel').style.color = '#bbb';
    document.getElementById('ex-prog-sel').style.pointerEvents = 'none';
    return;
  }
  const filtradas = _instituicoes.filter(x => x.nome.toLowerCase().includes(q)).slice(0,30);
  if (!filtradas.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = filtradas.map(x =>
    `<div onclick="selecionarInstituicao('${x.id}','${x.nome.replace(/'/g,"\'")}')"     style="padding:9px 13px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)"
     onmouseenter="this.style.background='#f4f4f2'" onmouseleave="this.style.background=''">${x.nome}</div>`
  ).join('');
  dd.style.display = 'block';
}

async function selecionarInstituicao(id, nome) {
  document.getElementById('ex-inst-input').value = nome;
  document.getElementById('ex-inst-input').style.color = 'var(--text)';
  document.getElementById('ex-inst-sel').value = id;
  document.getElementById('ex-inst-dropdown').style.display = 'none';
  S.instId = id; S.instNm = nome;
  // Reseta programa ao trocar instituição
  document.getElementById('ex-prog-input').value = '';
  document.getElementById('ex-prog-sel').value = '';
  S.progId = ''; S.progNm = '';
  await carregarProgramas();
}

// Fecha dropdown ao clicar fora
document.addEventListener('click', e => {
  if (!e.target.closest('#ex-inst-input') && !e.target.closest('#ex-inst-dropdown')) {
    const dd = document.getElementById('ex-inst-dropdown');
    if (dd) dd.style.display = 'none';
  }
  if (!e.target.closest('#ex-prog-input') && !e.target.closest('#ex-prog-dropdown')) {
    const dd = document.getElementById('ex-prog-dropdown');
    if (dd) dd.style.display = 'none';
  }
});

// ── Carregar Programas ───────────────────────────────────────────────────────
async function carregarProgramas() {
  const instId = document.getElementById('ex-inst-sel').value;
  const progInput = document.getElementById('ex-prog-input');
  const progSel   = document.getElementById('ex-prog-sel');
  _programas = [];
  progInput.value = ''; progInput.disabled = true;
  progInput.placeholder = 'Nome parcial...'; progInput.style.color = '#bbb';
  progSel.value = ''; S.progId = ''; S.progNm = '';
  if (!instId) {
    // Sem instituição — usa programas da UF se disponíveis
    if (_programas_uf.length > 0) {
      _programas = _programas_uf.map(p => ({ id: '__uf__', nome: p.nome }));
      progInput.disabled = false; progInput.style.color = '';
    }
    return;
  }
  progInput.placeholder = 'Carregando...';
  try {
    const r = await fetch(`${API}/programas/${instId}`);
    const d = await r.json();
    _programas = d;
    progInput.placeholder = 'Nome parcial...';
    progInput.disabled = false;
    progInput.style.color = '';
  } catch(e) { progInput.placeholder = 'Erro ao carregar'; }
}

function filtrarProgramas() {
  const q = document.getElementById('ex-prog-input').value.toLowerCase().trim();
  const dd = document.getElementById('ex-prog-dropdown');
  if (!q) {
    dd.style.display = 'none';
    document.getElementById('ex-prog-sel').value = '';
    S.progId = ''; S.progNm = '';
    return;
  }
  const filtrados = _programas.filter(x => x.nome.toLowerCase().includes(q)).slice(0,30);
  if (!filtrados.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = filtrados.map(x =>
    `<div onclick="selecionarPrograma('${x.id}','${x.nome.replace(/'/g,"\'")}')"     style="padding:9px 13px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)"     onmouseenter="this.style.background='#f4f4f2'" onmouseleave="this.style.background=''">${x.nome}</div>`
  ).join('');
  dd.style.display = 'block';
}

function selecionarPrograma(id, nome) {
  document.getElementById('ex-prog-input').value = nome;
  document.getElementById('ex-prog-input').style.color = 'var(--text)';
  document.getElementById('ex-prog-dropdown').style.display = 'none';
  S.progNm = nome;
  if (id === '__uf__') {
    // Programa sem instituição — guarda nome para filtrar localmente
    document.getElementById('ex-prog-sel').value = '';
    S.progId = '';
  } else {
    document.getElementById('ex-prog-sel').value = id;
    S.progId = id;
  }
}

// ── Pesquisar ────────────────────────────────────────────────────────────────
async function pesquisar() {
  const medico = document.getElementById('ex-medico').value.trim();
  const crm    = document.getElementById('ex-crm').value.trim();
  const cert   = document.getElementById('ex-cert').value.trim();
  const ocorr  = document.getElementById('ex-ocorr').value;
  const uf     = document.getElementById('ex-uf').value;
  const ini    = document.getElementById('ex-ini').value;
  const fim    = document.getElementById('ex-fim').value;
  const instSel = document.getElementById('ex-inst-sel');
  const progSel = document.getElementById('ex-prog-sel');
  const inst = document.getElementById('ex-inst-sel').value || '';
  const prog = document.getElementById('ex-prog-sel').value || '';
  const instNm = inst ? (document.getElementById('ex-inst-input')?.value || S.instNm || '') : '';
  const progNm = prog ? (document.getElementById('ex-prog-input')?.value || S.progNm || '') : '';

  const hintNome = document.getElementById('hint-nome');
  if (hintNome) hintNome.style.display = (medico && !inst) ? 'block' : 'none';

  if (!medico && !crm && !cert && !ocorr && !inst && !S.progNm) {
    alert('Preencha ao menos um campo para pesquisar.');
    return;
  }

  // Reset completo
  filtroInstAtivo = false;
  rowsOriginal = [];
  Object.keys(crmMulti).forEach(k => delete crmMulti[k]);
  Object.keys(crmCache).forEach(k => delete crmCache[k]);
  Object.keys(contatoCache).forEach(k => delete contatoCache[k]);
  multiRows = {};
  telBuscandoTotal = 0; telBuscandoConcluido = 0;
  document.querySelectorAll('#stat-multi').forEach(el => el.remove());
  document.querySelectorAll('#stat-tel').forEach(el => el.remove());
  document.getElementById('tb-ex').innerHTML = '';
  document.getElementById('th-ex').innerHTML = '';
  document.getElementById('stats').innerHTML = '';
  document.getElementById('res-ex').classList.add('hidden');
  document.getElementById('btn-xl').classList.add('hidden');
  document.getElementById('btn-limpar-res').style.display = 'none';

// ── Render ───────────────────────────────────────────────────────────────────
const COL_ORDER = ['Nº Certificado','Médico','CRM','Programa','Instituição','UF','Início','Término','Emissão do Certificado','Informações Adicionais'];

function reordenarColunas(dados) {
  if (!dados.length) return {cols:[], dados};
  const keys = Object.keys(dados[0]).filter(k => k && k.trim());
  const finalCols = [];
  COL_ORDER.forEach(c => { const f = keys.find(k => k === c); if (f && !finalCols.includes(f)) finalCols.push(f); });
  keys.forEach(k => { if (!finalCols.includes(k)) finalCols.push(k); });
  return {cols: finalCols, dados};
}

function renderTabela(d, instNm, progNm) {
  if (!d.length) return;
  rowsOriginal = [...d];
  const {cols} = reordenarColunas(d);
  const extra = [];
  if (instNm) extra.push(`<div class="stat" style="flex:2"><div class="stat-v" style="font-size:13px">${instNm}</div><div class="stat-l">${progNm||'Todos os programas'}</div></div>`);
  document.getElementById('stats').innerHTML =
    `<div class="stat"><div class="stat-v">${d.length}</div><div class="stat-l">Certificados</div></div>` + extra.join('');
  const crmColIdx = cols.findIndex(c => c === 'CRM');
  // Colunas sempre fixas + Telefone e Email sempre presentes
  const COLS_SEMPRE = ['Nº Certificado','Médico','CRM','Programa','Instituição','UF','Início','Término','Emissão do Certificado','Informações Adicionais','Telefone','Email'];
  const colsExibir = COLS_SEMPRE.filter(c => cols.includes(c) || ['Telefone','Email'].includes(c));
  document.getElementById('th-ex').innerHTML = colsExibir.map(c => `<th>${c}</th>`).join('');
  document.getElementById('tb-ex').innerHTML = d.map((r, i) => {
    const crm = r['CRM'] || '';
    const cache = contatoCache[crm] || {};
    const tds = colsExibir.map(c => {
      if (c === 'CRM') return `<td style="white-space:nowrap"><span id="bdg-${i}" data-crm="${crm}"></span>${crm}</td>`;
      if (c === 'Telefone') return `<td id="tel-${i}" class="tel-cell">${cache.telefone||''}</td>`;
      if (c === 'Email') return `<td id="eml-${i}" style="font-size:12px">${cache.email||''}</td>`;
      return `<td>${r[c]??''}</td>`;
    });
    return `<tr>${tds.join('')}</tr>`;
  }).join('');
  document.getElementById('res-ex').classList.remove('hidden');
  document.getElementById('btn-xl').classList.remove('hidden');
  document.getElementById('btn-limpar-res').style.display = '';
  document.getElementById('tel-wrap').style.display = 'inline-flex';
    // Só mostra filtro de última inst quando há instituição na pesquisa
  const _instVal = document.getElementById('ex-inst-sel').value;
  if (_instVal) {
    document.getElementById('btn-filtro-inst').classList.remove('hidden');
  } else {
    document.getElementById('btn-filtro-inst').classList.add('hidden');
  }
  // Busca contatos automaticamente se credenciais configuradas
  if (didEmail && didSenha) buscarContatosAuto(d);

  // Verifica CRMs em background
  multiRows = {};
  crmVerificandoTotal = 0; crmVerificandoConcluido = 0;
  const crmsVistos = {};
  d.forEach((r, i) => { const crm = r['CRM']; if (!crm) return; if (!crmsVistos[crm]) crmsVistos[crm] = []; crmsVistos[crm].push(i); });
  crmVerificandoTotal = Object.keys(crmsVistos).length;
  if (crmVerificandoTotal === 0) { finalizarStatMulti(); return; }
  Object.entries(crmsVistos).forEach(([crm, indices]) => verificarMultiCRM(crm, indices));
}

function renderTabelaDados(d) {

      if (c === 'Email') return `<td id="eml-${i}" style="font-size:12px">${cache.email||''}</td>`;
      return `<td>${r[c]??''}</td>`;
    });
    return `<tr>${tds.join('')}</tr>`;
  }).join('');
  d.forEach((r, i) => { const crm = r['CRM']||''; if (crmMulti[crm]) colocarBadge(crm, [i], crmMulti[crm]); });

// ── Multi-cert ───────────────────────────────────────────────────────────────
async function verificarMultiCRM(crm, indices) {
  if (!crm) return;
  if (crmMulti[crm]) { colocarBadge(crm, indices, crmMulti[crm]); }
  else {
    try {
      const r = await fetch(`${API}/contar?crm=${encodeURIComponent(crm)}`);
      const data = await r.json();
      if ((data.total||0) > 1) { crmMulti[crm] = data.total; colocarBadge(crm, indices, data.total); atualizarStatMulti(); }
    } catch(e) {}
  }
  crmVerificandoConcluido++;
  if (crmVerificandoConcluido >= crmVerificandoTotal) finalizarStatMulti();
}

function colocarBadge(crm, indices, total) {
  indices.forEach(i => {
    const el = document.getElementById(`bdg-${i}`);
    if (el) { const safe = crm.replace(/'/g,"\\'"); el.innerHTML = `<span class="badge-multi" title="${total} certificações" onclick="abrirModalCRM('${safe}')">★</span>`; }
  });
}

function atualizarStatMulti() {
  const total = Object.keys(crmMulti).length;
  const statsEl = document.getElementById('stats');
  document.querySelectorAll('#stat-multi').forEach(el => el.remove());
  const s = document.createElement('div');
  s.className = 'stat'; s.id = 'stat-multi';
  s.innerHTML = `<div class="stat-v" style="color:var(--gold)">${total} <span id="spin-multi" style="font-size:14px;color:var(--muted);animation:spin .7s linear infinite;display:inline-block">⟳</span></div><div class="stat-l">Múltiplas cert.</div>`;
  statsEl.appendChild(s);
}

function finalizarStatMulti() {
  const spin = document.getElementById('spin-multi');
  if (spin) { spin.innerHTML = ' ✓'; spin.style.animation = 'none'; spin.style.color = 'var(--green)'; }
  const btnFiltro = document.getElementById('btn-filtro-inst');
  if (btnFiltro) { btnFiltro.disabled = false; btnFiltro.style.opacity = ''; btnFiltro.style.cursor = ''; }
}

function _xl() {
  const wb = XLSX.utils.book_new();
  const COLS_EXTRA = ['Programa','Instituição','Início','Término','Emissão do Certificado'];
  let maxExtra = 0;
  rows.forEach(r => {
    const crm = r['CRM']||'';
    const extras = (crmCache[crm]||[]).filter(c => (c['Nº Certificado']||'') !== (r['Nº Certificado']||''));
    if (extras.length > maxExtra) maxExtra = extras.length;
  });
  const COLS_FIXAS = ['Nº Certificado','Médico','CRM','Programa','Instituição','UF','Início','Término','Emissão do Certificado','Informações Adicionais'];
  const enriched = rows.map(r => {
    const crm = r['CRM']||'';
    const total = crmMulti[crm]||1;
    const contato = contatoCache[crm] || {};
    const extras = (crmCache[crm]||[]).filter(c => (c['Nº Certificado']||'') !== (r['Nº Certificado']||''));
    const obj = {};
    COLS_FIXAS.forEach(col => { obj[col] = r[col] ?? ''; });
    obj['Múltiplas Formações'] = total > 1 ? 'SIM' : 'NÃO';
    obj['Total Certificações'] = total;
    for (let i=0; i<maxExtra; i++) {
      const ex = extras[i];
      COLS_EXTRA.forEach(col => { obj[`Formação ${i+2} - ${col}`] = ex ? (ex[col]||'') : ''; });
    }
    obj['Telefone'] = contato.telefone || '';
    obj['Email'] = contato.email || '';
    return obj;
  });
  const ws1 = XLSX.utils.json_to_sheet(enriched);
  XLSX.utils.book_append_sheet(wb, ws1, 'Certificados');
  const multiFlat = [];
  const seen = new Set();
  Object.values(crmCache).filter(c => c.length>1).forEach(certs => {
    certs.forEach(r => { const k=(r['Nº Certificado']||'')+(r['CRM']||''); if (!seen.has(k)){seen.add(k);multiFlat.push(r);} });
  });
  if (multiFlat.length > 0) { const ws2=XLSX.utils.json_to_sheet(multiFlat); XLSX.utils.book_append_sheet(wb,ws2,'Múltiplas Formações'); }
  XLSX.writeFile(wb, `certificados_${Date.now()}.xlsx`);
}

// Pesquisa por múltiplos combos inst+prog em paralelo
async function pesquisarPorCombos(progNm, combos, medico, crm, cert, ocorr, ini, fim) {
  const BATCH = 20; // todas em paralelo por lote
  const TIMEOUT = 8000; // 8s por requisição
  let todos = [];
  const dedup = new Set();

  const fetchComTimeout = (url) => {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), TIMEOUT);
    return fetch(url, {signal: controller.signal})
      .then(r => r.json())
      .catch(() => ({dados:[]}))
      .finally(() => clearTimeout(timer));
  };

  for (let i = 0; i < combos.length; i += BATCH) {
    const lote = combos.slice(i, i + BATCH);
    const resultados = await Promise.all(lote.map(({inst_id, prog_id}) => {
      const p = new URLSearchParams();
      p.set('inst', inst_id);
      p.set('prog', prog_id);
      if (medico) p.set('medico', medico);
      if (crm)    p.set('crm', crm);
      if (cert)   p.set('cert', cert);
      if (ocorr)  p.set('ocorr', ocorr);
      if (ini)    p.set('ini', ini);
      if (fim)    p.set('fim', fim);
      return fetchComTimeout(`${API}/certificados?${p.toString()}`);
    }));
    resultados.forEach(d => {
      (d.dados||[]).forEach(r => {
        const k = (r['Nº Certificado']||'') + (r['CRM']||'');
        if (!dedup.has(k)) { dedup.add(k); todos.push(r); }
      });
    });
  }

  rows = todos;
  renderTabela(todos, '', progNm);
  // Esconde filtro de última instituição — não faz sentido sem inst específica
  document.getElementById('btn-filtro-inst').classList.add('hidden');

  if (todos.length === 0) {
    document.getElementById('log').innerHTML = 'Nenhum certificado encontrado para os filtros informados.';
    document.getElementById('log').style.display = 'block';
  }

  document.getElementById('btn-ex').disabled = false;
  document.getElementById('sp-ex').classList.add('hidden');
}

    })
    if "JSESSIONID" not in c.cookies:
        return False, "Login falhou. Verifique email e senha."
    xsrf = c.cookies.get("XSRF-TOKEN", xsrf)
    c.headers.update({
        "X-Requested-With": "XMLHttpRequest",
        "X-Xsrf-Token": xsrf,
        "Referer": DOCTORID_URL + "/",
    })
    with session_lock:
        client_session = c
    return True, "OK"

def buscar_telefone(crm):
    with session_lock:
        c = client_session
    if not c:
        return {"erro": "não autenticado"}
    crm_digitos = re.sub(r'\\D', '', str(crm))
    crm_fmt = crm_digitos.ljust(12, "_")
    try:
        r = c.post(DOCTORID_URL + "/personGroupCompany/find",
            data={"conselhoRegional": crm_fmt, "cpf": "", "nome": ""},
            timeout=15)
        if r.status_code != 200:
            return {"crm": crm, "telefone": "", "nome": ""}
        data = r.json()
        pessoas = data.get("data", {}).get("pessoas", [])
        if not pessoas:
            return {"crm": crm, "telefone": "", "nome": ""}
        pessoa = pessoas[0]
        id_pessoa = pessoa.get("idPessoa")
        nome = pessoa.get("nomePessoa", "")
        # Busca telefone
        r2 = c.get(f"{DOCTORID_URL}/personGroupCompany/new/{id_pessoa}", timeout=15)
        if r2.status_code == 200:
            p = r2.json().get("data", {}).get("pessoa", {})
            tel = p.get("celularFormatado") or p.get("celular") or ""
        else:
            tel = ""
        return {"crm": crm, "telefone": tel, "nome": nome}
    except Exception as e:
        return {"crm": crm, "telefone": "", "erro": str(e)}

# ── Servidor HTTP local ────────────────────────────────────────────────────────
class Handler(BaseHTTPRequestHandler):
    def log_message(self, format, *args):
        pass  # silencia logs

    def do_OPTIONS(self):
        self.send_response(200)
        self._cors()
        self.end_headers()

    def do_GET(self):
        parsed = urlparse(self.path)
        params = parse_qs(parsed.query)

        if parsed.path == "/ping":
            self._json({"status": "ok", "autenticado": client_session is not None})

        elif parsed.path == "/telefone":
            crm = params.get("crm", [""])[0]
            if not crm:
                self._json({"erro": "crm obrigatório"}, 400)
                return
            resultado = buscar_telefone(crm)
            self._json(resultado)
        else:
            self._json({"erro": "rota não encontrada"}, 404)

    def _cors(self):
        self.send_header("Access-Control-Allow-Origin", "*")
        self.send_header("Access-Control-Allow-Methods", "GET, OPTIONS")
        self.send_header("Access-Control-Allow-Headers", "Content-Type")

    def _json(self, data, code=200):
        body = json.dumps(data, ensure_ascii=False).encode()
        self.send_response(code)
        self.send_header("Content-Type", "application/json; charset=utf-8")
        self._cors()
        self.end_headers()
        self.wfile.write(body)

def iniciar_servidor():
    server = HTTPServer(("127.0.0.1", PORT), Handler)
    server.serve_forever()

    def _tentar_auto_login(self):
        email, senha = carregar_credenciais()
        if email and senha:
            self.email_var.set(email)
            self.senha_var.set(senha)
            self.status_var.set("Conectando...")
            threading.Thread(target=self._login_thread,
                             args=(email, senha), daemon=True).start()

    def _conectar(self):
        email = self.email_var.get().strip()
        senha = self.senha_var.get().strip()
        if not email or not senha:
            messagebox.showwarning("Atenção", "Preencha email e senha.")
            return
        self.btn.config(state="disabled", text="Conectando...")
        self.status_var.set("Autenticando...")
        threading.Thread(target=self._login_thread,
                         args=(email, senha), daemon=True).start()

    def _login_thread(self, email, senha):
        ok, msg = fazer_login(email, senha)
        self.after(0, lambda: self._login_result(ok, msg, email, senha))

    def _login_result(self, ok, msg, email, senha):
        self.btn.config(state="normal", text="Conectar")
        if ok:
            salvar_credenciais(email, senha)
            self.status_var.set("✓ Conectado — pronto para buscar telefones")
            self.status_label.config(fg="#2d7a4f")
            self.btn.config(text="Reconectar")
        else:
            self.status_var.set(f"✗ {msg}")
            self.status_label.config(fg="#c0392b")

async function buscarTelefones() {
  if (!proxyAtivo || !rows.length) return;
  const crmsUnicos = [...new Set(rows.map(r => r['CRM']).filter(c => c && !telefoneCache[c]))];
  if (!crmsUnicos.length) return;

  telBuscandoTotal = crmsUnicos.length;
  telBuscandoConcluido = 0;

  // Cria stat de telefones
  const statsEl = document.getElementById('stats');
  document.querySelectorAll('#stat-tel').forEach(el => el.remove());
  const s = document.createElement('div');
  s.className = 'stat'; s.id = 'stat-tel';
  s.innerHTML = `<div class="stat-v" style="color:var(--green)">0 <span id="spin-tel" style="font-size:14px;color:var(--muted);animation:spin .7s linear infinite;display:inline-block">⟳</span></div><div class="stat-l">Telefones</div>`;
  statsEl.appendChild(s);

  // Garante coluna Telefone no header
  const thEl = document.getElementById('th-ex');
  if (!thEl.innerHTML.includes('Telefone')) {
    thEl.innerHTML += '<th>Telefone</th>';
    // Adiciona células vazias nas linhas existentes
    document.querySelectorAll('#tb-ex tr').forEach((tr, i) => {
      const crm = rows[i]?.['CRM'] || '';
      const td = document.createElement('td');
      td.id = `tel-${i}`;
      td.className = 'tel-cell';
      td.textContent = telefoneCache[crm] || '';
      tr.appendChild(td);
    });
  }

  // Busca em paralelo (lotes de 5)
  const BATCH = 5;
  for (let i = 0; i < crmsUnicos.length; i += BATCH) {
    const lote = crmsUnicos.slice(i, i + BATCH);
    await Promise.all(lote.map(async crm => {
      try {
        const r = await fetch(`${PROXY}/telefone?crm=${encodeURIComponent(crm)}`, 
          {signal: AbortSignal.timeout(15000)});
        const d = await r.json();
        telefoneCache[crm] = d.telefone || '';
        // Atualiza células na tabela
        rows.forEach((row, idx) => {
          if ((row['CRM']||'') === crm) {
            const el = document.getElementById(`tel-${idx}`);
            if (el) el.textContent = d.telefone || '';
          }
        });
      } catch(e) { telefoneCache[crm] = ''; }
      telBuscandoConcluido++;
      // Atualiza contador
      const encontrados = Object.values(telefoneCache).filter(t => t).length;
      const statEl = document.getElementById('stat-tel');
      if (statEl) statEl.querySelector('.stat-v').innerHTML = 
        `<span style="color:var(--green)">${encontrados}</span> <span id="spin-tel" style="font-size:14px;color:var(--muted);animation:spin .7s linear infinite;display:inline-block">⟳</span>`;
      if (telBuscandoConcluido >= telBuscandoTotal) {
        const spin = document.getElementById('spin-tel');
        if (spin) { spin.innerHTML = ' ✓'; spin.style.animation = 'none'; spin.style.color = 'var(--green)'; }
      }
    }));
  }
}

async function verificarSenha() {
  const senha = document.getElementById('senha-input').value;
  const encoder = new TextEncoder();
  const data = encoder.encode(senha);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
  
  // Hash espalhado em partes para dificultar leitura
  const p1 = "bf5af652864726d0";
  const p2 = "ee31246e7e7b2feb";
  const p3 = "cb0bb8d625132";
  const p4 = "4b990d8c5ab2e9aa7bd";
  
  if (hashHex === p1+p2+p3+p4) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    sessionStorage.setItem('auth', '1');
  } else {
    document.getElementById('senha-erro').style.display = 'block';
    document.getElementById('senha-input').value = '';
    document.getElementById('senha-input').focus();
  }
}

// Verifica se já autenticou nesta sessão
if (sessionStorage.getItem('auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-content').style.display = 'block';
}

// Datas ficam pretas ao preencher
document.querySelectorAll('input[type="date"]').forEach(inp => {
  inp.addEventListener('change', function() { this.style.color = this.value ? 'var(--text)' : ''; });
});
</script>
