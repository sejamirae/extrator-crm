<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --teal:#013b47;--teal2:#01505f;--gold:#c9a96e;
  --bg:#f0f0ee;--surface:#fff;--border:#deded8;
  --text:#0f0f0f;--muted:#7a7a72;--green:#2a6e45;--red:#9c2a1e;
  --r:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.hdr{background:var(--teal);height:50px;padding:0 28px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(0,0,0,.2)}
.hdr-logo{width:30px;height:30px;object-fit:contain;flex-shrink:0;display:block}
.hdr-text h1{font-size:14px;font-weight:600;color:#fff;letter-spacing:-.1px}
.hdr-text p{font-size:10px;color:rgba(255,255,255,.38);letter-spacing:.2px}
#btn-dark{margin-left:auto;background:none;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.55);font-family:'Inter',sans-serif;font-size:11px;padding:5px 10px;border-radius:var(--r);cursor:pointer;letter-spacing:.2px;transition:all .15s}
#btn-dark:hover{border-color:rgba(255,255,255,.35);color:rgba(255,255,255,.8)}
#btn-manual{background:none;border:1px solid rgba(201,169,110,.45);color:rgba(201,169,110,.85);font-family:'Inter',sans-serif;font-size:11px;padding:5px 10px;border-radius:var(--r);cursor:pointer;letter-spacing:.2px;margin-left:8px;animation:manual-pulse 3s ease-in-out infinite;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
#btn-manual:hover{border-color:var(--gold);color:var(--gold);animation:none}
@keyframes manual-pulse{0%,100%{border-color:rgba(201,169,110,.45);color:rgba(201,169,110,.85);box-shadow:none}50%{border-color:rgba(201,169,110,.9);color:rgba(201,169,110,1);box-shadow:0 0 8px rgba(201,169,110,.25)}}
.main{max-width:920px;margin:0 auto;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sec{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px}
.div{border-top:1px solid var(--border);margin:14px -20px;padding:14px 20px 0}
.field{margin-bottom:12px}
label{display:block;font-size:9px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.9px}
input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:8px 11px;outline:none;transition:border-color .12s,background .12s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--teal);background:#fff;box-shadow:0 0 0 2px rgba(1,59,71,.07)}
input::placeholder,input[type="date"]{color:#bbb}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:start}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--r);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;letter-spacing:.15px;white-space:nowrap}
.btn-p{background:var(--teal);color:#fff}.btn-p:hover{background:var(--teal2)}.btn-p:disabled{opacity:.3;cursor:not-allowed}
.btn-g{background:var(--gold);color:#fff}.btn-g:hover{filter:brightness(1.06)}.btn-g:disabled{opacity:.3;cursor:not-allowed}
.btn-o{background:none;border:1px solid var(--border);color:var(--muted)}.btn-o:hover{border-color:var(--teal);color:var(--teal)}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r);margin-top:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8f8f6;color:var(--muted);font-size:9px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;padding:9px 13px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 13px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8f8f6}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;flex:1;min-width:80px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.sv{font-size:20px;font-weight:700;color:var(--teal);line-height:1;display:flex;align-items:center;gap:5px}
.sl{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.6px}
.log{border-radius:var(--r);padding:10px 14px;font-size:12px;margin-top:10px;display:none;border:1px solid #f0c0b8;background:#fdf0ee;color:var(--red)}
.log-i{background:#eff4f6;border-color:#c0d4dc;color:var(--muted)}
.spin{display:inline-block;width:11px;height:11px;border:1.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;opacity:.45;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.ck{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.badge{display:inline-block;width:5px;height:5px;background:var(--gold);border-radius:50%;cursor:pointer;margin-right:4px;vertical-align:middle;transition:transform .15s;opacity:.8}
.badge:hover{transform:scale(1.5);opacity:1}
.tog{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--r);background:none;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap}
.tog.on{background:#eaf2ed;border-color:#a8d0b8;color:var(--green)}
.tog:disabled{opacity:.35;cursor:not-allowed}
.track{width:26px;height:15px;border-radius:8px;background:#ccc;position:relative;transition:background .15s;flex-shrink:0;display:inline-block}
.track::after{content:'';position:absolute;width:11px;height:11px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.tog.on .track{background:var(--green)}
.tog.on .track::after{left:13px}
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--teal);color:#fff;font-size:11px;padding:3px 8px;border-radius:2px;cursor:pointer;margin:2px;letter-spacing:.1px}
.tag:hover{background:var(--teal2)}
.dd{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.ddi{padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border);transition:background .1s}
.ddi:last-child{border-bottom:none}
.ddi:hover{background:#f4f4f2}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-ov.open{display:flex}
.modal{background:#fff;border-radius:var(--r);padding:24px;max-width:780px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.14)}
.mhdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.mtit{font-size:14px;font-weight:700;color:var(--teal)}
.msub{font-size:11px;color:var(--muted);margin-top:2px}
.mcl{background:none;border:none;font-size:16px;cursor:pointer;color:var(--muted);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:var(--r)}
.mcl:hover{background:var(--bg)}
#btn-top{position:fixed;bottom:24px;right:24px;width:38px;height:38px;background:var(--teal);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:16px;display:none;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2);z-index:100;transition:opacity .2s}
#btn-top:hover{background:var(--teal2)}
body.dark #btn-top{background:var(--teal2)}
.cc{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:8px}
.cc:last-child{margin-bottom:0}
.cn{font-size:9px;font-weight:700;color:var(--teal);letter-spacing:.9px;text-transform:uppercase;margin-bottom:10px}
.did-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ccc;margin-right:5px;vertical-align:middle}
.did-dot.on{background:var(--green)}
.hint{font-size:11px;color:var(--muted);margin-top:3px;display:none}
.hidden{display:none!important}
.mt10{margin-top:10px}

/* Dark */
body.dark{--bg:#1a1a1a;--surface:#242424;--border:#383838;--text:#e8e8e8;--muted:#909090;--green:#4aaa6a}
body.dark .hdr{background:var(--teal);border-color:rgba(0,0,0,.4)}
body.dark .card{background:var(--surface);border-color:var(--border);box-shadow:none}
body.dark .stat{background:var(--surface);border-color:var(--border);box-shadow:none}
body.dark .sv{color:#7ac8d8}
body.dark input,body.dark select{background:#2a2a2a;border-color:var(--border);color:var(--text)}
body.dark input:focus,body.dark select:focus{background:#303030;border-color:rgba(255,255,255,.25)}
body.dark input::placeholder,body.dark input[type="date"]{color:#606060}
body.dark label{color:var(--muted)}
body.dark .sec{color:var(--muted)}
body.dark .tbl-wrap{border-color:var(--border);box-shadow:none}
body.dark th{background:#1e1e1e;color:#787878;border-color:var(--border)}
body.dark td{border-color:var(--border);color:var(--text)}
body.dark tr:hover td{background:#2e2e2e}
body.dark .dd{background:#2a2a2a;border-color:var(--border)}
body.dark .ddi{background:#2a2a2a;border-color:var(--border);color:var(--text)}
body.dark .ddi:hover{background:#383838}
body.dark .log{background:#2a1818;border-color:#5a2828;color:#e08080}
body.dark .log-i{background:#1a2428;border-color:#2a4050;color:var(--muted)}
body.dark .modal{background:var(--surface)}
body.dark .mhdr{border-color:var(--border)}
body.dark .cc{background:#2e2e2e;border-color:var(--border)}
body.dark .btn-o{border-color:var(--border);color:var(--muted)}
body.dark .btn-o:hover{border-color:rgba(255,255,255,.3);color:var(--text)}
body.dark .tog{border-color:var(--border);color:var(--muted)}
body.dark .tog.on{background:#1a2e22;border-color:#3a6e4a;color:var(--green)}
body.dark .tag{background:#015a70}
body.dark .tag:hover{background:var(--teal2)}
body.dark #login-screen{background:#1a1a1a}
body.dark #login-screen>div{background:#242424;border-color:var(--border)}
body.dark #login-screen input{background:#2a2a2a;border-color:var(--border);color:var(--text)}
body.dark #login-screen input::placeholder{color:#606060}

@media(max-width:580px){.g2,.g3{grid-template-columns:1fr}}
</style>
</head>

<div class="main">
<div class="card">

  <div class="sec">Médico</div>
  <div class="g2" style="margin-bottom:0">
    <div class="field" style="margin:0">
      <label>Nome</label>
      <input type="text" id="ex-medico" placeholder="Nome completo em caixa alta" oninput="this.value=this.value.toUpperCase()">
      <div class="hint" id="hint-nome">Para busca parcial por nome, selecione a instituição.</div>
    </div>
    <div class="field" style="margin:0"><label>CRM</label><input type="text" id="ex-crm" placeholder="ex: 131036"></div>
  </div>

  <div class="div">
    <div class="sec">Certificado</div>
    <div class="g2">
      <div class="field" style="margin:0"><label>Número</label><input type="text" id="ex-cert" placeholder="ex: 394979"></div>
      <div class="field" style="margin:0"><label>Data de Emissão</label><input type="date" id="ex-ocorr"></div>
    </div>
  </div>

  <div class="div">
    <div class="sec">Instituição e Programa</div>
    <div class="g3" style="margin-bottom:12px">
      <div class="field" style="margin:0;position:relative">
        <label>UF</label>
        <div id="uf-tags" style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px;min-height:0"></div>
        <select id="ex-uf" onchange="adicionarUF()">
          <option value="">— Selecionar</option>
          <option>SP</option><option>RJ</option><option>MG</option><option>RS</option><option>PR</option><option>BA</option><option>SC</option><option>GO</option><option>PE</option><option>CE</option><option>DF</option><option>ES</option><option>PA</option><option>MT</option><option>MS</option><option>AM</option><option>RN</option><option>PB</option><option>AL</option><option>PI</option><option>MA</option><option>SE</option><option>TO</option><option>RO</option><option>AC</option><option>AP</option><option>RR</option>
        </select>
      </div>
      <div class="field" style="margin:0;position:relative">
        <label>Instituição</label>
        <div id="inst-tags" style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px;min-height:0"></div>
        <input type="text" id="ex-inst-input" placeholder="Nome parcial" autocomplete="off" disabled oninput="filtrarInstituicoes()">
        <div id="ex-inst-dd" class="dd"></div>
      </div>
      <div class="field" style="margin:0;position:relative">
        <label>Programa</label>
        <div id="prog-tags" style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px;min-height:0"></div>
        <input type="text" id="ex-prog-input" placeholder="Nome parcial" autocomplete="off" disabled oninput="filtrarProgramas()">
        <div id="ex-prog-dd" class="dd"></div>
      </div>
    </div>
    <div class="g2">
      <div class="field" style="margin:0"><label>Emissão — Início</label><input type="date" id="ex-ini"></div>
      <div class="field" style="margin:0"><label>Emissão — Fim</label><input type="date" id="ex-fim"></div>
    </div>
  </div>

  <div class="div">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="display:flex;align-items:center"><span class="did-dot" id="did-dot"></span><span class="sec" style="margin:0">DoctorID</span><span style="font-size:10px;color:var(--muted);margin-left:6px" id="did-st"></span></div>
      <button onclick="toggleDid()" style="background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline;font-family:Inter,sans-serif;padding:0">Configurar</button>
    </div>
    <div id="did-form" style="display:none">

      </div>
      <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
        <button class="btn btn-p" onclick="salvarDid()">Salvar</button>
        <span id="did-msg" style="font-size:11px;color:var(--muted)"></span>
      </div>
    </div>
  </div>

  <div class="row" style="margin-top:14px">
    <button class="btn btn-p" id="btn-ex" onclick="pesquisar()"><span id="sp-ex" class="hidden spin" style="border-color:rgba(255,255,255,.4);border-top-color:#fff"></span>Pesquisar</button>

    <button class="tog hidden" id="btn-fi" onclick="toggleFiltroInst()" disabled><span class="track"></span>Ocultar médicos com certificação mais recente em outra instituição</button>
  </div>

function fmt(v){if(!v)return '';var p=v.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function parseDate(s){if(!s)return new Date(0);var p=s.split('/');return new Date(+p[2],+p[1]-1,+p[0]);}
function dark(){return document.body.classList.contains('dark');}

// ── Modo escuro ───────────────────────────────────────────────────────────────
function toggleDark(){
  document.body.classList.toggle('dark');
  var on=dark();
  document.getElementById('btn-dark').textContent=on?'Modo Claro':'Modo Escuro';
  localStorage.setItem('dark',on?'1':'0');
}
if(localStorage.getItem('dark')==='1'){
  document.body.classList.add('dark');
  document.addEventListener('DOMContentLoaded',function(){
    var b=document.getElementById('btn-dark');if(b)b.textContent='Modo Claro';

}

// ── UF multi-select ───────────────────────────────────────────────────────────
async function adicionarUF(){
  var sel=document.getElementById('ex-uf');
  var uf=sel.value;
  sel.value='';
  if(!uf||ufsSelec.indexOf(uf)>=0) return;
  ufsSelec.push(uf);
  renderUFTags();
  await carregarUF(uf);
}

function removerUF(uf){
  ufsSelec=ufsSelec.filter(function(u){return u!==uf;});
  delete _insts[uf];
  delete _loadingUFs[uf];
  // Remove combos desta UF e reconstrói
  reconstruirCombos();
  renderUFTags();
  renderInstOptions();
  renderProgOptions();
}

function renderUFTags(){
  var c=document.getElementById('uf-tags');
  c.innerHTML=ufsSelec.map(function(uf){
    return '<span class="tag" onclick="removerUF(\''+uf+'\')">'+uf+' ×</span>';
  }).join('');
}

async function carregarUF(uf){
  if(_loadingUFs[uf]) return _loadingUFs[uf];
  var p=Promise.all([
    fetch(API+'/instituicoes/'+uf).then(function(r){return r.json();}).then(function(d){_insts[uf]=d;}),
    fetch(API+'/programas_uf/'+uf).then(function(r){return r.json();}).then(function(d){
      d.forEach(function(p){
        var nome=p.nome.trim().toUpperCase();
        if(!_combos[nome]) _combos[nome]=[];
        p.combos.forEach(function(c){
          var k=c.inst_id+'_'+c.prog_id;
          var existe=_combos[nome].find(function(x){return x.inst_id+'_'+x.prog_id===k;});
          if(!existe) _combos[nome].push(c);
        });
      });
    })
  ]).then(function(){
    renderInstOptions();
    renderProgOptions();
  });
  _loadingUFs[uf]=p;
  return p;
}

function reconstruirCombos(){
  _combos={};
  // Recarrega cada UF selecionada
  ufsSelec.forEach(function(uf){
    delete _loadingUFs[uf];
    carregarUF(uf);
  });
}

  if(!q){dd.style.display='none';return;}
  var allInsts=[];

  var q=document.getElementById('ex-prog-input').value.toLowerCase().trim();

  // Programas disponíveis: dos combos da UF + das instituições selecionadas

// ── Pesquisar ─────────────────────────────────────────────────────────────────
async function pesquisar(){
  var medico=document.getElementById('ex-medico').value.trim();
  var crm=document.getElementById('ex-crm').value.trim();
  var cert=document.getElementById('ex-cert').value.trim();
  var ocorr=document.getElementById('ex-ocorr').value;
  var ini=document.getElementById('ex-ini').value;
  var fim=document.getElementById('ex-fim').value;

  var hintNome=document.getElementById('hint-nome');
  if(hintNome) hintNome.style.display=(medico&&instsSelec.length===0)?'block':'none';

  var temFiltro=medico||crm||cert||ocorr||ufsSelec.length>0||instsSelec.length>0||progsSelec.length>0;
  if(!temFiltro){alert('Preencha ao menos um campo para pesquisar.');return;}

  resetResultados();
  document.getElementById('btn-ex').disabled=true;
  document.getElementById('sp-ex').classList.remove('hidden');
  iniciarFaviconLoader();

  // Acorda servidor
  setLog('Conectando ao servidor','i');
  try{await fetch(API+'/',{signal:AbortSignal.timeout(60000)});}catch(e){}
  document.getElementById('log').style.display='none';

  // Garante que combos das UFs selecionadas estão carregados
  if(ufsSelec.length>0){
    var pendentes=ufsSelec.filter(function(uf){return !_loadingUFs[uf];});
    if(pendentes.length>0){
      setLog('Carregando programas das UFs selecionadas','i');
      await Promise.all(pendentes.map(function(uf){return carregarUF(uf);}));
      document.getElementById('log').style.display='none';
    } else {
      await Promise.all(ufsSelec.map(function(uf){return _loadingUFs[uf];}));
    }
    // Atualiza combos dos programas selecionados com dados mais recentes
    // Refresh obrigatório dos combos após garantir que UFs carregaram
    progsSelec.forEach(function(p){
      var nome=p.nome.trim().toUpperCase();
      var novos=(_combos[nome]||[]).slice();
      if(novos.length>0) p.combos=novos; // só atualiza se encontrou
    });
    // Debug: log quantos combos cada programa tem
    var debugInfo=progsSelec.map(function(p){return p.nome+': '+p.combos.length+' combos';}).join(', ');
    console.log('[Pesquisa] Combos por programa:', debugInfo);
  }

  // Define o caminho de pesquisa
  var iniF=ini?fmt(ini):'';
  var fimF=fim?fmt(fim):'';
  var ocorrF=ocorr?fmt(ocorr):'';

  try{
    // Caso 1: programas selecionados → busca por combos
    if(progsSelec.length>0){
      var todosOsCombos=[],seenK={};
      progsSelec.forEach(function(p){
        p.combos.forEach(function(c){
          // Filtra por instituições selecionadas se houver
          if(instsSelec.length>0&&!instsSelec.find(function(x){return x.id===c.inst_id;})) return;
          var k=c.inst_id+'_'+c.prog_id;
          if(!seenK[k]){seenK[k]=1;todosOsCombos.push(c);}
        });
      });
      if(todosOsCombos.length>0){
        await buscarPorCombos(todosOsCombos,medico,crm,cert,ocorrF,iniF,fimF);
      } else {
        setLog('Nenhuma combinação encontrada para os programas selecionados. Verifique se a UF foi selecionada antes dos programas.','');
        document.getElementById('btn-ex').disabled=false;
        document.getElementById('sp-ex').classList.add('hidden');
        return;
      }
    }
    // Caso 2: instituições específicas sem programa
    else if(instsSelec.length>0){
      var params=new URLSearchParams();
      if(iniF&&fimF){params.set('ini',iniF);params.set('fim',fimF);}
      if(ocorrF) params.set('ocorr',ocorrF);
      if(medico) params.set('medico',medico.toUpperCase());
      if(crm) params.set('crm',crm);
      if(cert) params.set('cert',cert);
      var resultados=[],dedup={};
      await Promise.all(instsSelec.map(async function(inst){
        var p2=new URLSearchParams(params);
        p2.set('inst',inst.id);
        try{
          var r=await fetch(API+'/certificados?'+p2.toString());
          var d=await r.json();
          (d.dados||[]).forEach(function(row){
            var k=(row['Nº Certificado']||'')+(row['CRM']||'');
            if(!dedup[k]){dedup[k]=1;resultados.push(row);}
          });
        }catch(e){}
      }));
      rows=resultados;
      renderTabela(resultados,'','');
    }
    // Caso 3: busca genérica por UF / CRM / nome
    else{
      var uf=ufsSelec.length===1?ufsSelec[0]:'';
      var params=new URLSearchParams();
      if(uf) params.set('uf',uf);
      if(iniF&&fimF){params.set('ini',iniF);params.set('fim',fimF);}
      if(ocorrF) params.set('ocorr',ocorrF);
      if(medico) params.set('medico',medico.toUpperCase());
      if(crm) params.set('crm',crm);
      if(cert) params.set('cert',cert);
      var r=await fetch(API+'/certificados?'+params.toString());
      var data=await r.json();
      if(data.error) throw new Error(data.error);
      if((data.total||0)===0) setLog('Nenhum certificado encontrado.','');
      rows=data.dados||[];
      renderTabela(rows,'','');
    }
  }catch(e){
    setLog('Erro: '+e.message,'');
  }finally{
    document.getElementById('btn-ex').disabled=false;
    document.getElementById('sp-ex').classList.add('hidden');
  }
}

async function buscarPorCombos(combos,medico,crm,cert,ocorr,ini,fim){
  var BATCH=5,TIMEOUT=15000;
  var todos=[],dedup={};
  var total=combos.length,processados=0;
  var colsInicializadas=false;

  // Barra de progresso
  setLog('Iniciando busca em '+total+' combinações','i');

  for(var i=0;i<combos.length;i+=BATCH){
    var lote=combos.slice(i,i+BATCH);
    var res=await Promise.all(lote.map(async function(c){
      var ctrl=new AbortController();
      var t=setTimeout(function(){ctrl.abort();},TIMEOUT);
      var p=new URLSearchParams();
      p.set('inst',c.inst_id);p.set('prog',c.prog_id);
      if(medico) p.set('medico',medico);
      if(crm) p.set('crm',crm);
      if(cert) p.set('cert',cert);
      if(ocorr) p.set('ocorr',ocorr);
      if(ini) p.set('ini',ini);
      if(fim) p.set('fim',fim);
      try{var r=await fetch(API+'/certificados?'+p,{signal:ctrl.signal});clearTimeout(t);return await r.json();}
      catch(e){clearTimeout(t);return{dados:[]};}
    }));

    var novos=[];
    res.forEach(function(d){
      (d.dados||[]).forEach(function(row){
        var nc=row['Nº Certificado']||'';
        var cr=row['CRM']||'';
        var k=nc&&cr?(nc+'|'+cr):('i'+todos.length);
        if(!dedup[k]){dedup[k]=1;todos.push(row);novos.push(row);}
      });
    });

    // Atualiza status DEPOIS dos resultados chegarem
    processados+=lote.length;
    var pct=Math.round(processados/total*100);
    var loteIdxC=Math.ceil(processados/BATCH);
    var totalLotesC=Math.ceil(total/BATCH);
    var tempoC='';
    try{ tempoC=tempoRestante('cert',loteIdxC,totalLotesC); }catch(e){}
    setLog(pct+'% — '+todos.length+' certificado'+(todos.length===1?'':'s')+' encontrado'+(todos.length===1?'':'s')+tempoC,'i',loteIdxC<=2);

    // Exibe progressivamente
    if(novos.length>0){
      if(!colsInicializadas){
        // Inicializa tabela com primeiros resultados
        var cols=COLS.filter(function(c){return todos[0]&&(c in todos[0]);});
        var colsEx=cols.concat(['Telefone','Email']);
        document.getElementById('stats').innerHTML=
          '<div class="stat"><div class="sv" id="sv-count">'+todos.length+'</div><div class="sl">Certificados</div></div>';
        document.getElementById('th').innerHTML=colsEx.map(function(c){return '<th>'+lbl(c)+'</th>';}).join('');
        document.getElementById('tb').innerHTML='';
        document.getElementById('res').classList.remove('hidden');
        document.getElementById('btn-limpar').style.display='';
        colsInicializadas=true;
      }
      // Acrescenta novas linhas
      var tb=document.getElementById('tb');
      var cols2=COLS.filter(function(c){return todos[0]&&(c in todos[0]);});
      var colsEx2=cols2.concat(['Telefone','Email']);
      var offset=todos.length-novos.length;
      novos.forEach(function(row,j){
        var i2=offset+j;
        var crm2=row['CRM']||'';
        var tds=colsEx2.map(function(c){
          if(c==='CRM') return '<td style="white-space:nowrap"><span id="b-'+i2+'"></span>'+crm2+'</td>';
          if(c==='Telefone') return '<td id="tel-'+i2+'"></td>';
          if(c==='Email') return '<td id="eml-'+i2+'" style="font-size:11px"></td>';
          return '<td>'+(row[c]||'')+'</td>';
        });
        var tr=document.createElement('tr');
        tr.innerHTML=tds.join('');
        tb.appendChild(tr);
      });
      // Atualiza contador
      var sv=document.getElementById('sv-count');
      if(sv) sv.textContent=todos.length;
    }
  }

  rows=todos;
  rowsOrig=todos.slice();
  rowsView=todos.slice();
  document.getElementById('log').style.display='none';

  if(todos.length===0){
    setLog('Nenhum certificado encontrado.','');
    document.getElementById('btn-ex').disabled=false;
    document.getElementById('sp-ex').classList.add('hidden');
    return;
  }

  // Habilita botões
  document.getElementById('btn-limpar').style.display='';
  document.getElementById('btn-ex').disabled=false;
  document.getElementById('sp-ex').classList.add('hidden');
  // Inicia verificações em background
  iniciarMultiCheck(todos);
  if(didEmail&&didSenha) iniciarContatos(todos);
  else { document.getElementById('btn-st').disabled=true; }
}

// ── Semáforo de processos ─────────────────────────────────────────────────────
var _processos = {multi: false, contatos: false};
function marcarInicio(proc){ _processos[proc]=true; }
function marcarFim(proc){
  _processos[proc]=false;
  var algumAtivo=Object.values(_processos).some(function(v){return v;});
  if(!algumAtivo){
    // Tudo terminou — habilita XLSX e para favicon
    document.getElementById('btn-xl').classList.remove('hidden');
    document.getElementById('btn-xl').disabled=false;
    document.getElementById('btn-st').disabled=false;
    pararFaviconLoader();
    setLog('','',true);
    document.getElementById('log').style.display='none';
  }
}

var _lastLogTime=0;
var _lastLogTipo='';
var _tempoInicio={};
function setLog(msg,tipo,force){
  var now=Date.now();
  if(!force && _lastLogTipo===tipo && now-_lastLogTime < 2000) return;
  _lastLogTime=now;
  _lastLogTipo=tipo||'';
  var el=document.getElementById('log');
  el.textContent=msg;
  el.className='log'+(tipo==='i'?' log-i':'');
  el.style.display=(msg?'block':'none');
}

function tempoRestante(chave, feitos, total){
  var now=Date.now();
  if(!_tempoInicio[chave]){
    _tempoInicio[chave]=now;
    return '';
  }
  // Só estima após pelo menos 2 lotes para ter dados confiáveis
  if(feitos<2) return '';
  var elapsed=(now-_tempoInicio[chave])/1000;
  if(elapsed<1) return '';
  var porSegundo=feitos/elapsed;
  var restantes=total-feitos;
  if(restantes<=0) return '';
  var segundos=Math.round(restantes/porSegundo);
  if(!isFinite(segundos)||segundos<0) return '';
  // Formata de forma legível
  if(segundos<90) return ' — '+segundos+'s restantes';
  var minutos=Math.floor(segundos/60);
  var segs=segundos%60;
  if(segs<10) return ' — '+minutos+'min '+segs+'s restantes';
  return ' — '+minutos+'min '+Math.round(segs/10)*10+'s restantes';
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderTabela(d,instNm,progNm){
  rowsOrig=d.slice(); rowsView=d.slice();
  var cols=COLS.filter(function(c){return d[0]&&(c in d[0]);});
  var colsEx=cols.concat(['Telefone','Email']);

  // Stats: instituição/programa antes do count
  var statsHtml='';
  if(instNm) statsHtml+='<div class="stat" style="flex:2"><div class="sv" style="font-size:13px">'+instNm+'</div><div class="sl">'+(progNm||'Todos os programas')+'</div></div>';
  statsHtml+='<div class="stat"><div class="sv">'+d.length+'</div><div class="sl">Certificados</div></div>';
  document.getElementById('stats').innerHTML=statsHtml;

  document.getElementById('th').innerHTML=colsEx.map(function(c){return '<th>'+lbl(c)+'</th>';}).join('');
  renderLinhas(d,colsEx);
  document.getElementById('res').classList.remove('hidden');
  document.getElementById('btn-limpar').style.display='';
  // Botão XLSX só disponível após múltiplos terminar
  iniciarMultiCheck(d);
  if(didEmail&&didSenha) iniciarContatos(d);
}

function renderLinhas(d,colsEx){
  if(!colsEx){
    var src=rowsOrig.length?rowsOrig:d;
    var cols=COLS.filter(function(c){return src[0]&&(c in src[0]);});
    colsEx=cols.concat(['Telefone','Email']);
  }
  document.getElementById('tb').innerHTML=d.map(function(r,i){
    var crm=r['CRM']||'';
    var cache=contatoCache[crm]||{};
    var tds=colsEx.map(function(c){
      if(c==='CRM') return '<td style="white-space:nowrap"><span id="b-'+i+'" data-crm="'+crm+'"></span>'+crm+'</td>';
      if(c==='Telefone') return '<td id="tel-'+i+'">'+(cache.telefone||'')+'</td>';
      if(c==='Email') return '<td id="eml-'+i+'" style="font-size:11px">'+(cache.email||'')+'</td>';
      return '<td>'+(r[c]||'')+'</td>';
    });
    return '<tr>'+tds.join('')+'</tr>';
  }).join('');
}

function atualizarView(d){
  rowsView=d.slice();
  var src=rowsOrig.length?rowsOrig:d;
  var cols=COLS.filter(function(c){return src[0]&&(c in src[0]);});
  renderLinhas(d,cols.concat(['Telefone','Email']));
  d.forEach(function(r,i){var crm=r['CRM']||'';if(crmMulti[crm])colocarBadge(crm,[i],crmMulti[crm]);});
  // Atualiza APENAS o contador de certificados, sem tocar nos outros stats
  var sv=document.getElementById('sv-count');
  if(sv) sv.textContent=d.length;
}

// ── Multi-cert ────────────────────────────────────────────────────────────────
async function iniciarMultiCheck(d){
  multiTotal=0; multiDone=0;
  var crmsV={};
  d.forEach(function(r,i){var c=r['CRM'];if(!c)return;if(!crmsV[c])crmsV[c]=[];crmsV[c].push(i);});

  // Detecção imediata: CRMs que aparecem >1 vez nos resultados já têm múltiplos
  var paraVerificar=[];
  Object.keys(crmsV).forEach(function(crm){
    if(crmsV[crm].length>1){
      crmMulti[crm]=crmsV[crm].length;
      colocarBadge(crm,crmsV[crm],crmMulti[crm]);
    } else {
      paraVerificar.push(crm);
    }
  });

  multiTotal=paraVerificar.length;
  var multiImediatos=Object.keys(crmMulti).length;

  marcarInicio('multi');
  var statsEl=document.getElementById('stats');
  document.querySelectorAll('#stat-multi').forEach(function(el){el.remove();});
  var s=document.createElement('div');s.className='stat';s.id='stat-multi';
  var totalAtual=multiImediatos;
  s.innerHTML='<div class="sv" style="color:var(--gold)"><span id="sv-multi">'+totalAtual+'</span> '+(multiTotal>0?'<span class="spin"></span>':ckSvg('var(--gold)'))+'</div><div class="sl">Múltiplos Cert.</div>';
  statsEl.appendChild(s);

  if(multiTotal===0){finalizarMulti();marcarFim('multi');return;}

  // Verifica via /contar_bulk (igual ao telefone_bulk)
  var BULK=8;
  var totalLotesM=Math.ceil(paraVerificar.length/BULK);
  var loteNumM=0;
  for(var i=0;i<paraVerificar.length;i+=BULK){
    var lote=paraVerificar.slice(i,i+BULK);
    loteNumM++;
    // Inicializa o timer no primeiro lote
    if(loteNumM===1) tempoRestante('multi',1,totalLotesM);
    setLog('Múltiplos certificados: '+Math.round(loteNumM/totalLotesM*100)+'%'+tempoRestante('multi',loteNumM,totalLotesM),'i',loteNumM<=2);
    try{
      var r=await fetch(API+'/contar_bulk?crms='+lote.map(encodeURIComponent).join(','),{signal:AbortSignal.timeout(25000)});
      var data=await r.json();
      if(!data.error){
        Object.keys(data).forEach(function(crm){
          var total=data[crm]||0;
          if(total>1){
            crmMulti[crm]=total;
            if(crmsV[crm]) colocarBadge(crm,crmsV[crm],total);
          }
        });
      }
    }catch(e){}
    multiDone+=lote.length;
    var multi=Object.keys(crmMulti).length;
    var pct=Math.round((multiImediatos+multiDone)/(multiImediatos+multiTotal)*100);
    var svM=document.getElementById('sv-multi');
    var elM=document.getElementById('stat-multi');
    if(svM) svM.textContent=multi;
    if(elM&&multiDone>=multiTotal){
      elM.querySelector('.sv').innerHTML='<span style="color:var(--gold)">'+multi+'</span> '+ckSvg('var(--gold)');
      document.getElementById('log').style.display='none';
    }
  }
  finalizarMulti();
  marcarFim('multi');
}

function colocarBadge(crm,indices,total){
  indices.forEach(function(i){
    var el=document.getElementById('b-'+i);
    if(el) el.innerHTML='<span class="badge" title="'+total+' certificações" onclick="abrirModal(\''+crm.replace(/'/g,"\\'")+'\')"></span>';
  });
}

function atualizarStatMulti(){
  var total=Object.keys(crmMulti).length;
  var el=document.getElementById('stat-multi');
  if(el) el.querySelector('.sv').innerHTML='<span style="color:var(--gold)">'+total+'</span> <span class="spin"></span>';
}

function finalizarMulti(){
  var el=document.getElementById('stat-multi');
  if(el){var v=el.querySelector('.sv');if(v)v.innerHTML='<span style="color:var(--gold)">'+(Object.keys(crmMulti).length||'0')+'</span> '+ckSvg('var(--gold)');}
  // Mostra filtro de inst APENAS se uma instituição específica estiver selecionada
  if(instsSelec.length===1){
    document.getElementById('btn-fi').classList.remove('hidden');
    document.getElementById('btn-fi').disabled=false;
  }
}

// ── Contatos (bulk com sessão em cache) ───────────────────────────────────────
async function iniciarContatos(d){
  var crmsU=[],seen={};
  d.forEach(function(r){var c=r['CRM'];if(c&&!contatoCache[c]&&!seen[c]){seen[c]=1;crmsU.push(c);}});
  if(!crmsU.length) return;
  telTotal=crmsU.length; telDone=0;

  marcarInicio('contatos');
  var statsEl=document.getElementById('stats');
  document.querySelectorAll('#stat-tel').forEach(function(el){el.remove();});
  var s=document.createElement('div');s.className='stat';s.id='stat-tel';
  s.innerHTML='<div class="sv" style="color:var(--green)">0 <span class="spin"></span></div><div class="sl">Contatos</div>';
  statsEl.appendChild(s);

  // Envia 8 CRMs por lote ao endpoint bulk
  var BULK=8;
  var totalLotes=Math.ceil(crmsU.length/BULK);
  var loteNum=0;
  for(var i=0;i<crmsU.length;i+=BULK){
    var lote=crmsU.slice(i,i+BULK);
    loteNum++;
    // Inicializa o timer no primeiro lote
    if(loteNum===1) tempoRestante('contatos',1,totalLotes);
    setLog('Contatos: '+Math.round(loteNum/totalLotes*100)+'%'+tempoRestante('contatos',loteNum,totalLotes),'i',loteNum<=2);
    try{
      var p=new URLSearchParams({email:didEmail,senha:didSenha,crms:lote.join(',')});
      var r=await fetch(API+'/telefone_bulk?'+p.toString());
      var data=await r.json();
      if(data.error){
        // Tenta sessão nova na próxima iteração
        lote.forEach(function(crm){if(!contatoCache[crm])contatoCache[crm]={telefone:'',email:''};});
      } else {
        Object.keys(data).forEach(function(crm){
          var info=data[crm]||{};
          contatoCache[crm]={telefone:info.telefone||'',email:info.email||''};
          rows.forEach(function(row,ri){
            if((row['CRM']||'')===crm){
              var tel=document.getElementById('tel-'+ri);
              var eml=document.getElementById('eml-'+ri);
              if(tel) tel.textContent=contatoCache[crm].telefone;
              if(eml) eml.textContent=contatoCache[crm].email;
            }
          });
        });
      }
    }catch(e){
      lote.forEach(function(crm){if(!contatoCache[crm])contatoCache[crm]={telefone:'',email:''};});
    }
    telDone+=lote.length;
    var com=Object.values(contatoCache).filter(function(c){return c.telefone||c.email;}).length;
    var pct=Math.round(telDone/telTotal*100);
    var statEl=document.getElementById('stat-tel');
    if(statEl){
      if(telDone>=telTotal){
        statEl.querySelector('.sv').innerHTML='<span style="color:var(--green)">'+com+'</span> '+ckSvg('var(--green)');
        document.getElementById('btn-st').classList.remove('hidden');
      } else {
        statEl.querySelector('.sv').innerHTML='<span style="color:var(--green)">'+com+'</span> <span class="spin" title="'+pct+'%"></span>';
      }
    }
    // marcarFim FORA do if(statEl) para garantir execução
    if(telDone>=telTotal){
      marcarFim('contatos');
    }
  }
}

// ── Modal ─────────────────────────────────────────────────────────────────────

  document.getElementById('modal').classList.add('open');

    try{var r=await fetch(API+'/certificados?crm='+encodeURIComponent(crm));var d=await r.json();crmCache[crm]=d.dados||[];}
    catch(e){document.getElementById('m-body').innerHTML='<div style="color:var(--red)">Erro ao carregar.</div>';return;}
  }

  document.getElementById('m-nome').textContent=certs[0]['Médico']||crm;

      +'<tr><td style="color:var(--muted);padding:3px 14px 3px 0;width:55%;vertical-align:top">'+(c[kN]?'Número <b style="color:var(--text);font-weight:600">'+c[kN]+'</b>':'')+'</td>'
      +'<td style="color:var(--muted);padding:3px 0;vertical-align:top">'+(c[kIn]?'Início <b style="color:var(--text);font-weight:600">'+c[kIn]+'</b>':'')+'</td></tr>'
      +'<tr><td style="color:var(--muted);padding:3px 14px 3px 0;vertical-align:top">'+(c[kI]?'Instituição <b style="color:var(--text);font-weight:600">'+c[kI]+'</b>':'')+'</td>'
      +'<td style="color:var(--muted);padding:3px 0;vertical-align:top">'+(c[kT]?'Término <b style="color:var(--text);font-weight:600">'+c[kT]+'</b>':'')+'</td></tr>'

      +(c[kO]?'<tr><td colspan="2" style="color:var(--muted);padding:6px 0 0">Observações <span style="color:var(--text)">'+c[kO]+'</span></td></tr>':'')
      +'</table></div>';
  }).join('');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

// ── Filtros ───────────────────────────────────────────────────────────────────
async function toggleFiltroInst(){
  filtroInstOn=!filtroInstOn;
  var btn=document.getElementById('btn-fi');
  btn.classList.toggle('on',filtroInstOn);
  if(!filtroInstOn){
    // Restaura TODOS os resultados originais
    rows=rowsOrig.slice();
    atualizarView(rows);
    return;
  }
  btn.disabled=true;
  var instAtual=(rowsOrig[0]&&rowsOrig[0]['Instituição'])||'';
  // Busca cache dos que precisam
  var paraBuscar=[];var seen={};
  rowsOrig.forEach(function(r){var c=r['CRM']||'';if(c&&crmMulti[c]&&!crmCache[c]&&!seen[c]){seen[c]=1;paraBuscar.push(c);}});
  await Promise.all(paraBuscar.map(async function(crm){
    try{var r=await fetch(API+'/certificados?crm='+encodeURIComponent(crm));var d=await r.json();crmCache[crm]=d.dados||[];}catch(e){}
  }));
  var f=rowsOrig.filter(function(r){
    var c=r['CRM']||'';
    if(!crmMulti[c]) return true;
    var todos=crmCache[c]||[];if(!todos.length) return true;
    var rec=todos.reduce(function(a,b){return parseDate(a['Emissão do Certificado'])>=parseDate(b['Emissão do Certificado'])?a:b;});
    return (rec['Instituição']||'')===instAtual;
  });
  rows=f; atualizarView(f);
  btn.disabled=false;
}

function toggleSemTel(){
  semTelOn=!semTelOn;
  document.getElementById('btn-st').classList.toggle('on',semTelOn);
  if(semTelOn){
    var base=filtroInstOn?rowsView:rows;
    var f=base.filter(function(r){var c=contatoCache[r['CRM']||''];return c&&c.telefone;});
    atualizarView(f);
  } else {
    // Volta para o estado anterior (com ou sem filtro de inst)
    var base2=filtroInstOn?rowsView:rows;
    atualizarView(base2);
  }
}

// ── XLSX ──────────────────────────────────────────────────────────────────────
function exportXL(){
  if(!window.XLSX){var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=_xl;document.head.appendChild(s);}
  else _xl();
}
function _xl(){
  var wb=XLSX.utils.book_new();
  var HDR=['Nº Certificado','Médico','CRM','Programa','Instituição','UF','Início','Término','Emissão do Certificado','Informações Adicionais','Múltiplas Formações','Total Certificações','Telefone','Email'];
  var dados=rowsView.length?rowsView:rows;
  var enr=dados.map(function(r){
    var crm=r['CRM']||'';var total=crmMulti[crm]||1;var ct=contatoCache[crm]||{};
    var obj={};
    HDR.forEach(function(col){
      if(col==='Múltiplas Formações') obj[col]=total>1?'SIM':'NÃO';
      else if(col==='Total Certificações') obj[col]=total;
      else if(col==='Telefone') obj[col]=ct.telefone||'';
      else if(col==='Email') obj[col]=ct.email||'';
      else obj[col]=r[col]||'';
    });
    return obj;
  });
  var ws=XLSX.utils.json_to_sheet(enr,{header:HDR});
  XLSX.utils.book_append_sheet(wb,ws,'Certificados');
  XLSX.writeFile(wb,'certificados_'+Date.now()+'.xlsx');
}

// ── Senha ─────────────────────────────────────────────────────────────────────
async function vs(){
  var senha=document.getElementById('si').value;
  var enc=new TextEncoder();
  var buf=await crypto.subtle.digest('SHA-256',enc.encode(senha));
  var hex=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  var p1="bf5af652864726d0",p2="ee31246e7e7b2feb",p3="cb0bb8d625132",p4="4b990d8c5ab2e9aa7bd";
  if(hex===p1+p2+p3+p4){
    document.getElementById('ls').style.display='none';
    document.getElementById('ac').style.display='block';
    sessionStorage.setItem('auth','1');
  }else{
    document.getElementById('se').style.display='block';
    document.getElementById('si').value='';
    document.getElementById('si').focus();
  }
}
if(sessionStorage.getItem('auth')==='1'){
