<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extrator CRM — Mirae</title>
<style>
:root {
  --teal:#013b47;--teal2:#01505f;--gold:#c9a96e;
  --bg:#f0f0ee;--surface:#fff;--border:#deded8;
  --text:#0f0f0f;--muted:#7a7a72;--green:#2a6e45;--red:#9c2a1e;
  --r:4px;
}
body.dark {
  --bg:#1a1a1a;--surface:#242424;--border:#383838;--text:#e8e8e8;--muted:#909090;--green:#4aaa6a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5}

/* Ajustes Dark Mode para Configurações */
body.dark #cfg-panel { background: var(--surface); border-color: var(--border); color: var(--text); }
body.dark .cfg-item-label { background: var(--bg); color: var(--muted); border-color: var(--border); }
body.dark .cfg-item { border-color: var(--border); color: var(--text); }
body.dark .cfg-item:hover { background: var(--bg); }
body.dark .cfg-sep { border-color: var(--border); }

/* Estilos Gerais */
.hdr{background:var(--teal);height:48px;padding:0 22px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(0,0,0,.2)}
.hdr-title{font-size:14px;font-weight:600;color:#fff}
.hdr-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
#btn-cfg{background:none;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.6);padding:5px 12px;border-radius:var(--r);cursor:pointer}
#cfg-panel{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:6px;min-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:50;overflow:hidden}
#cfg-panel.open{display:block}
.cfg-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;font-size:12px;color:var(--text);border-bottom:1px solid var(--border)}
.cfg-item-label{color:var(--muted);font-size:9px;font-weight:700;text-transform:uppercase;padding:8px 14px;background:var(--bg);border-bottom:1px solid var(--border)}
.cfg-hdr-wrap{position:relative}

.main{max-width:920px;margin:0 auto;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:10px}
.field{margin-bottom:12px}
label{display:block;font-size:9px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase}
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:8px 11px;outline:none}
input:focus,select:focus{border-color:var(--teal)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--r);font-weight:600;cursor:pointer}
.btn-p{background:var(--teal);color:#fff}
.log{border-radius:var(--r);padding:10px 14px;font-size:12px;margin-top:10px;display:none;border:1px solid #f0c0b8;background:#fdf0ee;color:var(--red)}
.log-i{background:#eff4f6;border-color:#c0d4dc;color:var(--muted)}
.hidden{display:none!important}
.spin{display:inline-block;width:11px;height:11px;border:1.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.stats{display:flex;gap:8px;margin-bottom:10px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;flex:1}
.sv{font-size:20px;font-weight:700;color:var(--teal)}
.sl{font-size:9px;color:var(--muted);text-transform:uppercase}
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--teal);color:#fff;font-size:11px;padding:3px 8px;border-radius:2px;cursor:pointer;margin:2px}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r);margin-top:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8f8f6;color:var(--muted);font-size:9px;font-weight:700;padding:9px 13px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:9px 13px;border-bottom:1px solid var(--border);color:var(--text)}
body.dark th{background:#1e1e1e;color:#787878;border-color:var(--border)}
body.dark td{border-color:var(--border);color:var(--text)}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-title">Extrator CRM — Mirae</span>
  <div class="hdr-actions">
    <div class="cfg-hdr-wrap">
      <button id="btn-cfg" onclick="toggleCfg()">Configurações</button>
      <div id="cfg-panel">
        <div class="cfg-item-label">Preferências</div>
        <div class="cfg-item" onclick="toggleDark()">
          <span>Modo Escuro</span>
          <input type="checkbox" id="dark-toggle" style="width:auto">
        </div>
        <div class="cfg-item-label">Credenciais</div>
        <div style="padding:10px">
          <label>Email DoctorID</label>
          <input type="text" id="cfg-email" class="cfg-input" style="margin-bottom:8px">
          <label>Senha DoctorID</label>
          <input type="password" id="cfg-pass" class="cfg-input">
        </div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <!-- Abas -->
  <div style="display:flex;gap:10px;margin-bottom:20px">
    <button class="btn btn-p" onclick="showTab('siscnrm')">SisCNRM</button>
    <button class="btn btn-p" onclick="showTab('reuma')">Reumatologia</button>
  </div>

  <!-- ABA SisCNRM -->
  <div id="tab-siscnrm" class="tab-content">
    <div class="card">
      <div class="field">
        <label>UF</label>
        <div id="uf-tags"></div>
        <select id="sel-uf" onchange="adicionarUF()">
          <option value="">Selecionar...</option>
          <option value="*">Todos os Estados</option>
          <option value="SP">São Paulo</option>
          <option value="RJ">Rio de Janeiro</option>
          <!-- Adicionar outros conforme necessário -->
        </select>
      </div>
      <button class="btn btn-p" id="btn-buscar" onclick="pesquisar()">Buscar</button>
    </div>
    <div id="log" class="log"></div>
    <div id="res" class="hidden">
      <div id="stats" class="stats"></div>
      <div class="tbl-wrap">
        <table><thead><tr id="th"></tr></thead><tbody id="tb"></tbody></table>
      </div>
    </div>
  </div>

  <!-- ABA Reumatologia -->
  <div id="tab-reuma" class="tab-content" style="display:none">
    <div class="card">
      <div class="field">
        <label>UF (Reumatologia)</label>
        <select id="reuma-uf">
          <option value="">Todos</option>
          <option value="sp">São Paulo</option>
        </select>
      </div>
      <button class="btn btn-p" id="btn-reuma-buscar" onclick="reumaBuscar()">Buscar Associados</button>
    </div>
    <div id="reuma-log" class="log"></div>
    <div id="reuma-res" class="hidden">
      <div id="reuma-stats" class="stats"></div>
      <div class="tbl-wrap">
        <table><thead><tr id="reuma-th"></tr></thead><tbody id="reuma-tb"></tbody></table>
      </div>
    </div>
  </div>
</div>

<script>
let API = 'http://localhost:5000'; // Ajuste conforme necessário
let ufsSelec = [];
let _loadingUFs = {};
let _tempoInicio = {};

function toggleCfg() { document.getElementById('cfg-panel').classList.toggle('open'); }
function toggleDark() { 
  document.body.classList.toggle('dark');
  document.getElementById('dark-toggle').checked = document.body.classList.contains('dark');
}
function showTab(id) {
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  document.getElementById('tab-' + id).style.display = 'block';
}

function setLog(msg, tipo, id = 'log') {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'log' + (tipo === 'i' ? ' log-i' : '');
  el.style.display = msg ? 'block' : 'none';
}

function tempoRestante(chave, feitos, total) {
  const now = Date.now();
  if (!_tempoInicio[chave]) { _tempoInicio[chave] = now; return ''; }
  if (feitos < 2) return '';
  const elapsed = (now - _tempoInicio[chave]) / 1000;
  const porSegundo = feitos / elapsed;
  const restantes = total - feitos;
  const segundos = Math.round(restantes / porSegundo);
  return ' — ' + (segundos < 60 ? segundos + 's' : Math.ceil(segundos/60) + 'min') + ' restantes';
}

async function carregarUF(uf) {
  if (_loadingUFs[uf]) return _loadingUFs[uf];
  _loadingUFs[uf] = fetch(`${API}/instituicoes/${uf}`).then(r => r.json());
  return _loadingUFs[uf];
}

async function adicionarUF() {
  const sel = document.getElementById('sel-uf');
  const uf = sel.value;
  if (!uf) return;
  if (uf === '*') {
    const TODAS = ['SP','RJ','MG','RS','PR','BA','SC','GO','PE','CE','DF','ES','PA','MT','MS','AM','RN','PB','AL','PI','MA','SE','TO','RO','AC','AP','RR'];
    TODAS.forEach(u => { if (!ufsSelec.includes(u)) ufsSelec.push(u); });
    renderUFTags();
    setLog('Carregando estados em paralelo...', 'i');
    await Promise.all(TODAS.map(u => carregarUF(u)));
    setLog('Todos os estados carregados.', 'i');
  } else {
    if (!ufsSelec.includes(uf)) ufsSelec.push(uf);
    renderUFTags();
    await carregarUF(uf);
  }
}

function renderUFTags() {
  document.getElementById('uf-tags').innerHTML = ufsSelec.map(u => `<span class="tag">${u}</span>`).join('');
}

async function pesquisar() {
  setLog('Iniciando busca...', 'i');
  // Lógica de busca SisCNRM simplificada para exemplo
}

async function reumaBuscar() {
  setLog('Consultando SBR...', 'i', 'reuma-log');
  _tempoInicio['reuma'] = Date.now();
  
  try {
    const r = await fetch(`${API}/reuma/buscar`);
    const d = await r.json();
    const lista = d.associados || [];
    
    setLog(`${lista.length} associados encontrados. Buscando detalhes...`, 'i', 'reuma-log');
    
    // Simulação de lotes para mostrar progresso
    const LOTE = 10;
    for (let i = 0; i < lista.length; i += LOTE) {
      const progresso = Math.round(((i + LOTE) / lista.length) * 100);
      const tempo = tempoRestante('reuma', i + LOTE, lista.length);
      setLog(`Progresso: ${progresso}% ${tempo}`, 'i', 'reuma-log');
      await new Promise(res => setTimeout(res, 500)); // Simula delay
    }
    
    setLog('Busca concluída.', 'i', 'reuma-log');
  } catch (e) {
    setLog('Erro na busca: ' + e.message, '', 'reuma-log');
  }
}
</script>
</body>
</html>
