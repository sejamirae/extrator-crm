<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extrator CRM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{--teal:#013b47;--teal2:#014d5c;--gold:#d2ad74;--white:#fff;--bg:#f4f4f2;--surface:#fff;--border:#e8e8e5;--text:#1a1a1a;--muted:#8a8a82;--green:#2d7a4f;--red:#c0392b;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.hdr{background:var(--teal);padding:14px 32px;display:flex;align-items:center;gap:14px}
.hdr img{width:52px;height:52px;object-fit:contain;flex-shrink:0;display:block}
.hdr-text h1{font-size:17px;font-weight:600;color:#fff;letter-spacing:-.2px}
.hdr-text p{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
.main{max-width:880px;margin:0 auto;padding:28px 20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px;margin-bottom:14px}
.section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.divider{border-top:1px solid var(--border);margin:18px -22px;padding-top:18px;padding-left:22px;padding-right:22px}
.field{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px}
input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;padding:10px 13px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--teal);background:#fff;box-shadow:0 0 0 3px rgba(1,59,71,.08)}
input::placeholder{color:#bbb}
input[type="date"]{color:#bbb}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--teal);color:#fff}.btn-primary:hover{background:var(--teal2)}.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{filter:brightness(1.08)}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--teal);color:var(--teal)}
.btn-sm{padding:7px 14px;font-size:12px}
.flex-gap{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:9px;margin-top:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#fafaf8;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px 16px;flex:1;min-width:90px}
.stat-v{font-size:22px;font-weight:700;color:var(--teal);line-height:1}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px}
.log{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:12px 16px;font-size:13px;color:var(--red);margin-top:14px;display:none}
.badge-multi{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;background:var(--gold);color:#fff;border-radius:50%;font-size:8px;font-weight:700;cursor:pointer;margin-right:4px;vertical-align:middle;transition:transform .15s}
.badge-multi:hover{transform:scale(1.2)}
.toggle-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid var(--border);border-radius:7px;background:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .2s}
.toggle-btn.active{background:#eef7f2;border-color:#b8dcc8;color:var(--green)}
.toggle-btn .dot{width:32px;height:18px;border-radius:9px;background:#ddd;position:relative;transition:background .2s;flex-shrink:0}
.toggle-btn .dot::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-btn.active .dot{background:var(--green)}
.toggle-btn.active .dot::after{left:16px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:28px;max-width:800px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px}
.modal-title{font-size:16px;font-weight:700;color:var(--teal)}
.modal-sub{font-size:12px;color:var(--muted);margin-top:3px}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:0;line-height:1}
.modal-close:hover{color:var(--text)}
.cert-card{background:#fafaf8;border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px}
.cert-card:last-child{margin-bottom:0}
.cert-num{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:.5px;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;display:inline-block}
.hidden{display:none!important}
.mt14{margin-top:14px}
.hint{font-size:11px;color:var(--muted);margin-top:4px;display:none}
@media(max-width:580px){.row2,.row3{grid-template-columns:1fr}}
</style>
</head>

async function carregarProgramasUF(uf) {
  _programas_uf = [];
  _prog_combos = {};
  if (!uf) return;
  try {
    const r = await fetch(`${API}/programas_uf/${uf}`);

    d.forEach(p => { _prog_combos[p.nome] = p.combos; });

      const progInput = document.getElementById('ex-prog-input');
      if (progInput) { progInput.disabled = false; progInput.style.color = ''; }
    }

}

function filtrarProgramas() {

// ── Pesquisar ────────────────────────────────────────────────────────────────
async function pesquisar() {
  const medico = document.getElementById('ex-medico').value.trim();
  const crm    = document.getElementById('ex-crm').value.trim();
  const cert   = document.getElementById('ex-cert').value.trim();
  const ocorr  = document.getElementById('ex-ocorr').value;
  const uf     = document.getElementById('ex-uf').value;
  const ini    = document.getElementById('ex-ini').value;
  const fim    = document.getElementById('ex-fim').value;
  const instSel = document.getElementById('ex-inst-sel');
  const progSel = document.getElementById('ex-prog-sel');
  const inst = document.getElementById('ex-inst-sel').value || '';
  const prog = document.getElementById('ex-prog-sel').value || '';
  const instNm = inst ? (document.getElementById('ex-inst-input')?.value || S.instNm || '') : '';
  const progNm = prog ? (document.getElementById('ex-prog-input')?.value || S.progNm || '') : '';

  const hintNome = document.getElementById('hint-nome');
  if (hintNome) hintNome.style.display = (medico && !inst) ? 'block' : 'none';

  if (!medico && !crm && !cert && !ocorr && !inst && !S.progNm) {
    alert('Preencha ao menos um campo para pesquisar.');
    return;
  }

  // Reset completo
  filtroInstAtivo = false;
  rowsOriginal = [];
  Object.keys(crmMulti).forEach(k => delete crmMulti[k]);
  Object.keys(crmCache).forEach(k => delete crmCache[k]);
  multiRows = {};
  document.querySelectorAll('#stat-multi').forEach(el => el.remove());
  document.getElementById('tb-ex').innerHTML = '';
  document.getElementById('th-ex').innerHTML = '';
  document.getElementById('stats').innerHTML = '';
  document.getElementById('res-ex').classList.add('hidden');
  document.getElementById('btn-xl').classList.add('hidden');
  document.getElementById('btn-limpar-res').style.display = 'none';
  document.getElementById('btn-filtro-inst').classList.add('hidden');
  document.getElementById('btn-filtro-inst').classList.remove('active');
  document.getElementById('btn-filtro-inst').disabled = true;
  document.getElementById('btn-filtro-inst').style.opacity = '.4';
  document.getElementById('log').style.display = 'none';
  document.getElementById('log').innerHTML = '';
  document.getElementById('btn-ex').disabled = true;
  document.getElementById('sp-ex').classList.remove('hidden');

  const params = new URLSearchParams();
  // Se tem programa sem instituição: busca em paralelo por cada combo inst+prog
  if (!inst && !prog && S.progNm && _prog_combos[S.progNm]) {
    await pesquisarPorCombos(S.progNm, _prog_combos[S.progNm], medico, crm, cert, ocorr, ini ? fmt(ini) : '', fim ? fmt(fim) : '');
    return;
  }

  if (uf)    params.set('uf', uf);
  if (inst)  params.set('inst', inst);
  if (prog)  params.set('prog', prog);
  if (ini && fim) { params.set('ini', fmt(ini)); params.set('fim', fmt(fim)); }
  if (ocorr) params.set('ocorr', fmt(ocorr));
  if (medico) params.set('medico', medico.toUpperCase());
  if (crm)   params.set('crm', crm);
  if (cert)  params.set('cert', cert);

  try {
    const res  = await fetch(`${API}/certificados?${params.toString()}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (data.total === 0) {
      document.getElementById('log').innerHTML = 'Nenhum certificado encontrado para os filtros informados.';
      document.getElementById('log').style.display = 'block';
    }
    rows = data.dados;
    renderTabela(data.dados, instNm, progNm);
  } catch(e) {
    document.getElementById('log').innerHTML = `Erro: ${e.message}`;
    document.getElementById('log').style.display = 'block';
  } finally {
    document.getElementById('btn-ex').disabled = false;
    document.getElementById('sp-ex').classList.add('hidden');
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
const COL_ORDER = ['Nº Certificado','Médico','CRM','Programa','Instituição','UF','Início','Término','Emissão do Certificado','Informações Adicionais'];

function reordenarColunas(dados) {
  if (!dados.length) return {cols:[], dados};
  const keys = Object.keys(dados[0]).filter(k => k && k.trim());
  const finalCols = [];
  COL_ORDER.forEach(c => { const f = keys.find(k => k === c); if (f && !finalCols.includes(f)) finalCols.push(f); });
  keys.forEach(k => { if (!finalCols.includes(k)) finalCols.push(k); });
  return {cols: finalCols, dados};
}

function renderTabela(d, instNm, progNm) {
  if (!d.length) return;
  rowsOriginal = [...d];
  const {cols} = reordenarColunas(d);
  const extra = [];
  if (instNm) extra.push(`<div class="stat" style="flex:2"><div class="stat-v" style="font-size:13px">${instNm}</div><div class="stat-l">${progNm||'Todos os programas'}</div></div>`);
  document.getElementById('stats').innerHTML =
    `<div class="stat"><div class="stat-v">${d.length}</div><div class="stat-l">Certificados</div></div>` + extra.join('');
  const crmColIdx = cols.findIndex(c => c === 'CRM');
  document.getElementById('th-ex').innerHTML = cols.map(c => `<th>${c}</th>`).join('');
  document.getElementById('tb-ex').innerHTML = d.map((r, i) => {
    const crm = r['CRM'] || '';
    const tds = cols.map((c, ci) => {
      const val = r[c] ?? '';
      if (ci === crmColIdx) return `<td style="white-space:nowrap"><span id="bdg-${i}" data-crm="${crm}"></span>${val}</td>`;
      return `<td>${val}</td>`;
    });
    return `<tr>${tds.join('')}</tr>`;
  }).join('');
  document.getElementById('res-ex').classList.remove('hidden');
  document.getElementById('btn-xl').classList.remove('hidden');
  document.getElementById('btn-limpar-res').style.display = '';
  document.getElementById('btn-filtro-inst').classList.remove('hidden');
  // Verifica CRMs em background
  multiRows = {};
  crmVerificandoTotal = 0; crmVerificandoConcluido = 0;
  const crmsVistos = {};
  d.forEach((r, i) => { const crm = r['CRM']; if (!crm) return; if (!crmsVistos[crm]) crmsVistos[crm] = []; crmsVistos[crm].push(i); });
  crmVerificandoTotal = Object.keys(crmsVistos).length;
  if (crmVerificandoTotal === 0) { finalizarStatMulti(); return; }
  Object.entries(crmsVistos).forEach(([crm, indices]) => verificarMultiCRM(crm, indices));
}

function renderTabelaDados(d) {
  const {cols} = reordenarColunas(d.length ? d : rowsOriginal);
  const crmColIdx = cols.findIndex(c => c === 'CRM');
  document.getElementById('tb-ex').innerHTML = d.map((r, i) => {
    const crm = r['CRM'] || '';
    const tds = cols.map((c, ci) => {
      const val = r[c] ?? '';
      if (ci === crmColIdx) return `<td style="white-space:nowrap"><span id="bdg-${i}" data-crm="${crm}"></span>${val}</td>`;
      return `<td>${val}</td>`;
    });
    return `<tr>${tds.join('')}</tr>`;
  }).join('');
  d.forEach((r, i) => { const crm = r['CRM']||''; if (crmMulti[crm]) colocarBadge(crm, [i], crmMulti[crm]); });
  const statEl = document.querySelector('#stats .stat');
  if (statEl) statEl.innerHTML = `<div class="stat-v">${d.length}</div><div class="stat-l">Certificados</div>`;
}

// ── Multi-cert ───────────────────────────────────────────────────────────────
async function verificarMultiCRM(crm, indices) {
  if (!crm) return;
  if (crmMulti[crm]) { colocarBadge(crm, indices, crmMulti[crm]); }
  else {
    try {
      const r = await fetch(`${API}/contar?crm=${encodeURIComponent(crm)}`);
      const data = await r.json();
      if ((data.total||0) > 1) { crmMulti[crm] = data.total; colocarBadge(crm, indices, data.total); atualizarStatMulti(); }
    } catch(e) {}
  }
  crmVerificandoConcluido++;
  if (crmVerificandoConcluido >= crmVerificandoTotal) finalizarStatMulti();
}

function colocarBadge(crm, indices, total) {
  indices.forEach(i => {
    const el = document.getElementById(`bdg-${i}`);
    if (el) { const safe = crm.replace(/'/g,"\\'"); el.innerHTML = `<span class="badge-multi" title="${total} certificações" onclick="abrirModalCRM('${safe}')">★</span>`; }
  });
}

function atualizarStatMulti() {
  const total = Object.keys(crmMulti).length;
  const statsEl = document.getElementById('stats');
  document.querySelectorAll('#stat-multi').forEach(el => el.remove());
  const s = document.createElement('div');
  s.className = 'stat'; s.id = 'stat-multi';
  s.innerHTML = `<div class="stat-v" style="color:var(--gold)">${total} <span id="spin-multi" style="font-size:14px;color:var(--muted);animation:spin .7s linear infinite;display:inline-block">⟳</span></div><div class="stat-l">Múltiplas cert.</div>`;
  statsEl.appendChild(s);
}

function finalizarStatMulti() {
  const spin = document.getElementById('spin-multi');
  if (spin) { spin.innerHTML = ' ✓'; spin.style.animation = 'none'; spin.style.color = 'var(--green)'; }
  const btnFiltro = document.getElementById('btn-filtro-inst');
  if (btnFiltro) { btnFiltro.disabled = false; btnFiltro.style.opacity = ''; btnFiltro.style.cursor = ''; }
}

// ── Filtro última instituição ────────────────────────────────────────────────
async function toggleFiltroInst() {
  filtroInstAtivo = !filtroInstAtivo;
  const btn = document.getElementById('btn-filtro-inst');
  btn.classList.toggle('active', filtroInstAtivo);
  if (!filtroInstAtivo) {
    rows = [...rowsOriginal]; renderTabelaDados(rows);
    btn.innerHTML = '<span class="dot"></span> Ocultar médicos com cert. mais recente em outra inst.';
    return;
  }
  btn.innerHTML = '<span style="display:inline-block;animation:spin .7s linear infinite">⟳</span> Filtrando...';
  btn.disabled = true;
  const crmsParaBuscar = [...new Set(rowsOriginal.map(r => r['CRM']).filter(c => c && crmMulti[c] && !crmCache[c]))];
  await Promise.all(crmsParaBuscar.map(async crm => {
    try { const r = await fetch(`${API}/certificados?crm=${encodeURIComponent(crm)}`); const d = await r.json(); crmCache[crm] = d.dados||[]; } catch(e) {}
  }));
  const instAtual = rowsOriginal[0]?.['Instituição'] || '';
  const filtradas = rowsOriginal.filter(r => {
    const crm = r['CRM']||'';
    if (!crmMulti[crm]) return true;
    const todos = crmCache[crm]||[];
    if (!todos.length) return true;
    const recente = todos.reduce((a,b) => parseDateBR(a['Emissão do Certificado']) >= parseDateBR(b['Emissão do Certificado']) ? a : b);
    return (recente['Instituição']||'') === instAtual;
  });
  rows = filtradas; renderTabelaDados(rows);
  btn.innerHTML = '<span class="dot"></span> Ocultar médicos com cert. mais recente em outra inst.';
  btn.disabled = false;
}

  if (!window.XLSX) { const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'; s.onload=_xl; document.head.appendChild(s); }
  else _xl();
}

function _xl() {
  const wb = XLSX.utils.book_new();
  const COLS_EXTRA = ['Programa','Instituição','Início','Término','Emissão do Certificado'];
  let maxExtra = 0;
  rows.forEach(r => {
    const crm = r['CRM']||'';
    const extras = (crmCache[crm]||[]).filter(c => (c['Nº Certificado']||'') !== (r['Nº Certificado']||''));
    if (extras.length > maxExtra) maxExtra = extras.length;
  });
  const enriched = rows.map(r => {
    const crm = r['CRM']||'';
    const total = crmMulti[crm]||1;
    const extras = (crmCache[crm]||[]).filter(c => (c['Nº Certificado']||'') !== (r['Nº Certificado']||''));
    const obj = {...r, 'Múltiplas Formações': total>1?'SIM':'NÃO', 'Total Certificações': total};
    for (let i=0; i<maxExtra; i++) {
      const ex = extras[i];
      COLS_EXTRA.forEach(col => { obj[`Formação ${i+2} - ${col}`] = ex ? (ex[col]||'') : ''; });
    }
    return obj;
  });
  const ws1 = XLSX.utils.json_to_sheet(enriched);
  XLSX.utils.book_append_sheet(wb, ws1, 'Certificados');
  const multiFlat = [];
  const seen = new Set();
  Object.values(crmCache).filter(c => c.length>1).forEach(certs => {
    certs.forEach(r => { const k=(r['Nº Certificado']||'')+(r['CRM']||''); if (!seen.has(k)){seen.add(k);multiFlat.push(r);} });
  });
  if (multiFlat.length > 0) { const ws2=XLSX.utils.json_to_sheet(multiFlat); XLSX.utils.book_append_sheet(wb,ws2,'Múltiplas Formações'); }
  XLSX.writeFile(wb, `certificados_${Date.now()}.xlsx`);
}

// Pesquisa por múltiplos combos inst+prog em paralelo
async function pesquisarPorCombos(progNm, combos, medico, crm, cert, ocorr, ini, fim) {
  const BATCH = 8; // máx requisições simultâneas
  let todos = [];
  const dedup = new Set();

  for (let i = 0; i < combos.length; i += BATCH) {
    const lote = combos.slice(i, i + BATCH);
    const resultados = await Promise.all(lote.map(async ({inst_id, prog_id}) => {
      const p = new URLSearchParams();
      p.set('inst', inst_id);
      p.set('prog', prog_id);
      if (medico) p.set('medico', medico);
      if (crm)    p.set('crm', crm);
      if (cert)   p.set('cert', cert);
      if (ocorr)  p.set('ocorr', ocorr);
      if (ini)    p.set('ini', ini);
      if (fim)    p.set('fim', fim);
      try {
        const r = await fetch(`${API}/certificados?${p.toString()}`);
        const d = await r.json();
        return d.dados || [];
      } catch(e) { return []; }
    }));
    resultados.flat().forEach(r => {
      const k = (r['Nº Certificado']||'') + (r['CRM']||'');
      if (!dedup.has(k)) { dedup.add(k); todos.push(r); }
    });
  }

  rows = todos;
  renderTabela(todos, '', progNm);

  if (todos.length === 0) {
    document.getElementById('log').innerHTML = 'Nenhum certificado encontrado para os filtros informados.';
    document.getElementById('log').style.display = 'block';
  }

  document.getElementById('btn-ex').disabled = false;
  document.getElementById('sp-ex').classList.add('hidden');
}
