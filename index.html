<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root {
  --teal:#013b47;--teal2:#014d5c;--gold:#d2ad74;
  --bg:#f2f2f0;--surface:#ffffff;--border:#e2e2de;
  --text:#111111;--muted:#888880;--green:#2a6e45;--red:#b03020;
  --radius-sm:4px;--radius:6px;--radius-lg:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}

/* Header */
.hdr{background:var(--teal);padding:12px 32px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,.06)}
.hdr img{width:40px;height:40px;object-fit:contain;flex-shrink:0}
.hdr-text h1{font-size:15px;font-weight:600;color:#fff;letter-spacing:-.2px}
.hdr-text p{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px;letter-spacing:.2px}

/* Layout */
.main{max-width:900px;margin:0 auto;padding:24px 20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;margin-bottom:12px}

/* Sections */
.section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.divider{border-top:1px solid var(--border);margin:18px -22px;padding:18px 22px 0}

/* Fields */
.field{margin-bottom:14px}
label{display:block;font-size:10px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.8px}
input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:border-color .12s,background .12s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--teal);background:#fff;box-shadow:0 0 0 3px rgba(1,59,71,.07)}
input::placeholder{color:#bbb;font-weight:400}
input[type="date"]{color:#bbb}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;letter-spacing:.1px}
.btn-primary{background:var(--teal);color:#fff}.btn-primary:hover{background:var(--teal2)}.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-gold{background:var(--gold);color:#fff;letter-spacing:.2px}.btn-gold:hover{filter:brightness(1.06)}
.btn-outline{background:none;border:1px solid var(--border);color:var(--muted)}.btn-outline:hover{border-color:var(--teal);color:var(--teal)}
.flex-gap{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* Table */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg);margin-top:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8f8f6;color:var(--muted);font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:9px 13px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 13px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}

/* Stats */
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;flex:1;min-width:80px}
.stat-v{font-size:20px;font-weight:700;color:var(--teal);line-height:1}
.stat-l{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

/* Log */
.log{background:#fef2f0;border:1px solid #f0c0b8;border-radius:var(--radius);padding:11px 15px;font-size:12px;color:var(--red);margin-top:12px;display:none}

/* Spinner CSS puro */
.spin-css{display:inline-block;width:12px;height:12px;border:1.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
.spin-css.dark{border-color:rgba(0,0,0,.1);border-top-color:var(--muted)}
@keyframes spin{to{transform:rotate(360deg)}}

/* Badge multi-cert */
.badge-m{display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%;cursor:pointer;margin-right:5px;vertical-align:middle;transition:transform .15s}
.badge-m:hover{transform:scale(1.4)}

/* Toggle */
.toggle-wrap{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s;letter-spacing:.1px}
.toggle-wrap.on{background:#edf4f0;border-color:#b0d4bc;color:var(--green)}
.toggle-track{width:28px;height:16px;border-radius:8px;background:#d8d8d4;position:relative;transition:background .15s;flex-shrink:0}
.toggle-track::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.toggle-wrap.on .toggle-track{background:var(--green)}
.toggle-wrap.on .toggle-track::after{left:14px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--radius-lg);padding:28px;max-width:800px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.18)}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:700;color:var(--teal)}
.modal-sub{font-size:11px;color:var(--muted);margin-top:3px}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);padding:0;line-height:1;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm)}.modal-close:hover{background:var(--bg)}
.cert-card{background:#fafaf8;border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px}
.cert-card:last-child{margin-bottom:0}
.cert-num{font-size:10px;font-weight:700;color:var(--teal);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.tel-cell{color:var(--text)}
.hint{font-size:11px;color:var(--muted);margin-top:4px;display:none;font-style:italic}

/* DoctorID status dot */
.did-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ccc;margin-right:6px;vertical-align:middle}
.did-dot.on{background:var(--green)}

.hidden{display:none!important}
.mt12{margin-top:12px}
@media(max-width:580px){.row2,.row3{grid-template-columns:1fr}}
body.dark{--bg:#111;--surface:#1a1a1a;--border:#2a2a2a;--text:#e8e8e8;--muted:#666;background:#111}
body.dark .hdr{background:#012830}
body.dark input,body.dark select{background:#222;border-color:#333;color:#e8e8e8}
body.dark input:focus,body.dark select:focus{background:#2a2a2a}
body.dark .modal{background:#1a1a1a}
body.dark .cert-card{background:#222;border-color:#333}
body.dark th{background:#1e1e1e}
body.dark tr:hover td{background:#1e1e1e}
body.dark #login-screen{background:#111}
body.dark #login-screen > div{background:#1a1a1a;border-color:#2a2a2a}
.prog-tag{display:inline-flex;align-items:center;gap:4px;background:var(--teal);color:#fff;font-size:11px;padding:3px 8px;border-radius:3px;cursor:pointer}
.prog-tag:hover{background:var(--teal2)}
</style>
</head>

  <div class="hdr-text"><h1>Extrator CRM</h1><p>Certificados de Residência Médica — SisCNRM / MEC</p></div>
  <button id="btn-dark" onclick="toggleDark()" style="margin-left:auto;background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-family:Inter,sans-serif;font-size:11px;padding:6px 12px;border-radius:4px;cursor:pointer;letter-spacing:.3px">Modo Escuro</button>
</div>

<div class="main">
  <div class="card">
    <div class="section-title">Médico</div>
    <div class="row2" style="margin-bottom:0">
      <div class="field" style="margin:0">
        <label>Nome</label>
        <input type="text" id="ex-medico" placeholder="Nome completo em caixa alta" oninput="this.value=this.value.toUpperCase()">
        <div class="hint" id="hint-nome">Para busca parcial por nome, selecione a instituição primeiro.</div>
      </div>
      <div class="field" style="margin:0">
        <label>CRM</label>
        <input type="text" id="ex-crm" placeholder="ex: 131036">
      </div>
    </div>

    <div class="divider">
      <div class="section-title">Certificado</div>
      <div class="row2">
        <div class="field" style="margin:0">
          <label>Número</label>
          <input type="text" id="ex-cert" placeholder="ex: 394979">
        </div>
        <div class="field" style="margin:0">
          <label>Data de Emissão</label>
          <input type="date" id="ex-ocorr">
        </div>
      </div>
    </div>

    <div class="divider">
      <div class="section-title">Instituição e Programa</div>
      <div class="row3" style="margin-bottom:12px">
        <div class="field" style="margin:0">
          <label>UF</label>
          <select id="ex-uf" onchange="carregarInstituicoes()">
            <option value="" selected style="color:#bbb">—</option>
            <option>SP</option><option>RJ</option><option>MG</option><option>RS</option>
            <option>PR</option><option>BA</option><option>SC</option><option>GO</option>
            <option>PE</option><option>CE</option><option>DF</option><option>ES</option>
            <option>PA</option><option>MT</option><option>MS</option><option>AM</option>
            <option>RN</option><option>PB</option><option>AL</option><option>PI</option>
            <option>MA</option><option>SE</option><option>TO</option><option>RO</option>
            <option>AC</option><option>AP</option><option>RR</option>
          </select>
        </div>
        <div class="field" style="margin:0;position:relative">
          <label>Instituição</label>
          <input type="text" id="ex-inst-input" placeholder="Nome parcial" autocomplete="off" disabled style="color:#bbb" oninput="filtrarInstituicoes()">
          <div id="ex-inst-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:0 0 var(--radius-sm) var(--radius-sm);max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.08)"></div>
          <input type="hidden" id="ex-inst-sel" value="">
        </div>
        <div class="field" style="margin:0;position:relative">
          <label>Programa</label>
          <div id="prog-tags" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;min-height:0"></div>
          <input type="text" id="ex-prog-input" placeholder="Nome parcial" autocomplete="off" disabled style="color:#bbb" oninput="filtrarProgramas()">
          <div id="ex-prog-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:0 0 var(--radius-sm) var(--radius-sm);max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.08)"></div>
          <input type="hidden" id="ex-prog-sel" value="">
        </div>
      </div>
      <div class="row2">
        <div class="field" style="margin:0"><label>Emissão — Data Inicial</label><input type="date" id="ex-ini"></div>
        <div class="field" style="margin:0"><label>Emissão — Data Final</label><input type="date" id="ex-fim"></div>
      </div>

          <span class="section-title" style="margin:0">DoctorID</span>
          <span style="font-size:10px;color:var(--muted);margin-left:6px" id="doctorid-status"></span>
        </div>
        <button onclick="toggleDoctorid()" style="background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline;font-family:Inter,sans-serif">Configurar</button>
      </div>
      <div id="doctorid-form" style="display:none">
        <div class="row2">
          <div class="field" style="margin:0"><label>Email</label><input type="email" id="did-email" placeholder="email@exemplo.com"></div>
          <div class="field" style="margin:0"><label>Senha</label><input type="password" id="did-senha" placeholder="Senha do DoctorID"></div>
        </div>
        <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
          <button class="btn btn-primary" onclick="salvarCredenciaisDid()">Salvar</button>
          <span id="did-msg" style="font-size:11px;color:var(--muted)"></span>
        </div>
      </div>

    <div class="flex-gap" style="margin-top:16px">
      <button class="btn btn-primary" id="btn-ex" onclick="pesquisar()">
        <span id="sp-ex" class="hidden spin-css"></span> Pesquisar
      </button>

        <span class="toggle-track" id="toggle-sem-tel-dot"></span>
        Ocultar sem telefone
      </button>
      <button class="toggle-wrap hidden" id="btn-filtro-inst" onclick="toggleFiltroInst()" disabled style="opacity:.4;cursor:not-allowed">
        <span class="toggle-track" id="toggle-dot"></span>
        Ocultar médicos com certificação mais recente em outra instituição
      </button>

  <div class="log" id="log"></div>

  <div id="res-ex" class="hidden mt12">
    <div class="stats" id="stats"></div>
    <div class="tbl-wrap">
      <table><thead><tr id="th-ex"></tr></thead><tbody id="tb-ex"></tbody></table>
    </div>
  </div>
</div>

</div>

<!-- Modal médico -->
<div class="modal-overlay" id="modal-medico" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-title" id="modal-nome">—</div><div class="modal-sub" id="modal-crm">—</div></div>
      <button class="modal-close" onclick="fecharModal()">&#215;</button>
    </div>
    <div id="modal-certs"></div>
  </div>
</div>

<script>
const API = 'https://siscnrm-backend.onrender.com';
let S = {instId:'',instNm:'',progId:'',progNm:''};
let rows = [], rowsOriginal = [];
const crmCache = {}, crmMulti = {};
let multiRows = {};
let filtroInstAtivo = false;
let crmVerificandoTotal = 0, crmVerificandoConcluido = 0;
let _instituicoes = [], _programas = [], _programas_uf = [], _prog_combos = {};
const contatoCache = {};
let didEmail = '', didSenha = '';
let progsSelecionados = []; // [{id, nome}]
let telBuscandoTotal = 0, telBuscandoConcluido = 0;

const COLS_FIXAS = ['Instituição','Programa','Nº Certificado','Médico','CRM','UF','Início','Término','Emissão do Certificado','Informações Adicionais'];
const COLS_HEADER = {'Nº Certificado':'Certificado','Emissão do Certificado':'Emissão','Informações Adicionais':'Observações'};
const labelCol = c => COLS_HEADER[c] || c;

function fmt(v){ if(!v) return ''; const [y,m,d]=v.split('-'); return `${d}/${m}/${y}`; }
function parseDateBR(s){ if(!s) return new Date(0); const [d,m,y]=s.split('/'); return new Date(+y,+m-1,+d); }

// DoctorID
function toggleDoctorid() {
  const f = document.getElementById('doctorid-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}
function salvarCredenciaisDid() {
  const email = document.getElementById('did-email').value.trim();
  const senha = document.getElementById('did-senha').value.trim();
  if (!email || !senha) { document.getElementById('did-msg').textContent = 'Preencha os campos.'; return; }
  didEmail = email; didSenha = senha;
  localStorage.setItem('did_email', email); localStorage.setItem('did_senha', senha);
  document.getElementById('did-msg').textContent = 'Salvo';
  document.getElementById('doctorid-status').textContent = 'Configurado';
  document.getElementById('did-dot').classList.add('on');
  setTimeout(() => { document.getElementById('did-msg').textContent = ''; }, 2000);
  document.getElementById('doctorid-form').style.display = 'none';
}

async function buscarContatosAuto(d) {
  if (!didEmail || !didSenha) return;
  const crmsUnicos = [...new Set(d.map(r => r['CRM']).filter(c => c && !contatoCache[c]))];
  if (!crmsUnicos.length) return;
  telBuscandoTotal = crmsUnicos.length; telBuscandoConcluido = 0;
  const statsEl = document.getElementById('stats');
  document.querySelectorAll('#stat-tel').forEach(el => el.remove());
  const s = document.createElement('div'); s.className='stat'; s.id='stat-tel';
  s.innerHTML = `<div class="stat-v" style="color:var(--green)">0 <span id="spin-tel" class="spin-css dark" style="width:10px;height:10px;border-width:1.5px"></span></div><div class="stat-l">Contatos</div>`;
  statsEl.appendChild(s);
  const BATCH = 5;
  for (let i = 0; i < crmsUnicos.length; i += BATCH) {
    const lote = crmsUnicos.slice(i, i + BATCH);
    await Promise.all(lote.map(async crm => {
      try {
        const p = new URLSearchParams({email: didEmail, senha: didSenha, crm});
        const r = await fetch(`${API}/telefone?${p.toString()}`);
        const data = await r.json();
        contatoCache[crm] = {telefone: data.telefone||'', email: data.email||'', nome: data.nome||''};
      } catch(e) { contatoCache[crm] = {telefone:'', email:'', nome:''}; }
      rows.forEach((row, ri) => {
        if ((row['CRM']||'') === crm) {
          const tel = document.getElementById(`tel-${ri}`);
          const eml = document.getElementById(`eml-${ri}`);
          if (tel) tel.textContent = contatoCache[crm].telefone;
          if (eml) eml.textContent = contatoCache[crm].email;
        }
      });
      telBuscandoConcluido++;
      const com = Object.values(contatoCache).filter(c => c.telefone||c.email).length;
      const statEl = document.getElementById('stat-tel');
      if (statEl) statEl.querySelector('.stat-v').innerHTML =
        `<span style="color:var(--green)">${com}</span> <span id="spin-tel" class="spin-css dark" style="width:10px;height:10px;border-width:1.5px"></span>`;
      if (telBuscandoConcluido >= telBuscandoTotal) {
        const spin = document.getElementById('spin-tel');
        if (spin) { spin.outerHTML = '<span style="font-size:11px;color:var(--green)">ok</span>'; }
      }
    }));
  }
}

// Instituições
async function carregarInstituicoes() {
  const uf = document.getElementById('ex-uf').value;
  const instInput = document.getElementById('ex-inst-input');
  const progInput = document.getElementById('ex-prog-input');
  _instituicoes = []; _programas = []; _programas_uf = []; _prog_combos = {};
  instInput.value = ''; instInput.disabled = true; instInput.style.color = '#bbb';
  document.getElementById('ex-inst-sel').value = '';
  progInput.value = ''; progInput.disabled = true; progInput.style.color = '#bbb';
  document.getElementById('ex-prog-sel').value = '';
  S.instId = ''; S.instNm = ''; S.progId = ''; S.progNm = '';
  progsSelecionados = [];
  const pt = document.getElementById('prog-tags');
  if (pt) pt.innerHTML = '';
  if (!uf) return;
  instInput.placeholder = 'Carregando';
  try {
    const r = await fetch(`${API}/instituicoes/${uf}`);
    const d = await r.json();
    _instituicoes = d;
    instInput.placeholder = 'Nome parcial';
    instInput.disabled = false; instInput.style.color = '';
    carregarProgramasUF(uf);
  } catch(e) { instInput.placeholder = 'Erro ao carregar'; }
}

async function carregarProgramasUF(uf) {
  _programas_uf = []; _prog_combos = {};
  if (!uf) return;
  try {
    const r = await fetch(`${API}/programas_uf/${uf}`);
    const d = await r.json();
    _programas_uf = d;
    d.forEach(p => { _prog_combos[p.nome] = p.combos; });
    if (!document.getElementById('ex-inst-sel').value) {
      _programas = d.map(p => ({ id: '__uf__', nome: p.nome }));
      const pi = document.getElementById('ex-prog-input');
      if (pi) { pi.disabled = false; pi.style.color = ''; }
    }
  } catch(e) {}
}

function filtrarInstituicoes() {
  const q = document.getElementById('ex-inst-input').value.toLowerCase().trim();
  const dd = document.getElementById('ex-inst-dropdown');
  if (!q) {
    dd.style.display = 'none';
    document.getElementById('ex-inst-sel').value = '';
    S.instId = ''; S.instNm = '';
    document.getElementById('ex-prog-input').value = '';
    document.getElementById('ex-prog-sel').value = '';
    S.progId = ''; S.progNm = '';
    return;
  }
  const filtradas = _instituicoes.filter(x => x.nome.toLowerCase().includes(q)).slice(0,30);
  if (!filtradas.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = filtradas.map(x =>
    `<div onclick="selecionarInstituicao('${x.id}','${x.nome.replace(/'/g,"\'")}')" style="padding:9px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border)" onmouseenter="this.style.background='#f2f2f0'" onmouseleave="this.style.background=''">${x.nome}</div>`
  ).join('');
  dd.style.display = 'block';
}

async function selecionarInstituicao(id, nome) {
  document.getElementById('ex-inst-input').value = nome;
  document.getElementById('ex-inst-input').style.color = 'var(--text)';
  document.getElementById('ex-inst-sel').value = id;
  document.getElementById('ex-inst-dropdown').style.display = 'none';
  S.instId = id; S.instNm = nome;
  document.getElementById('ex-prog-input').value = '';
  document.getElementById('ex-prog-sel').value = '';
  S.progId = ''; S.progNm = '';
  await carregarProgramas();
}

async function carregarProgramas() {
  const instId = document.getElementById('ex-inst-sel').value;
  const progInput = document.getElementById('ex-prog-input');
  _programas = [];
  progInput.value = ''; progInput.disabled = true; progInput.style.color = '#bbb';
  document.getElementById('ex-prog-sel').value = '';
  S.progId = ''; S.progNm = '';
  if (!instId) {
    if (_programas_uf.length > 0) {
      _programas = _programas_uf.map(p => ({ id: '__uf__', nome: p.nome }));
      progInput.disabled = false; progInput.style.color = '';
    }
    return;
  }
  progInput.placeholder = 'Carregando';
  try {
    const r = await fetch(`${API}/programas/${instId}`);
    const d = await r.json();
    _programas = d;
    progInput.placeholder = 'Nome parcial';
    progInput.disabled = false; progInput.style.color = '';
  } catch(e) { progInput.placeholder = 'Erro ao carregar'; }
}

function filtrarProgramas() {
  const q = document.getElementById('ex-prog-input').value.toLowerCase().trim();
  const dd = document.getElementById('ex-prog-dropdown');
  if (!q) {
    dd.style.display = 'none';
    document.getElementById('ex-prog-sel').value = '';
    S.progId = ''; S.progNm = '';
    return;
  }
  const filtrados = _programas.filter(x => x.nome.toLowerCase().includes(q)).slice(0,30);
  if (!filtrados.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = filtrados.map(x =>
    `<div onclick="selecionarPrograma('${x.id}','${x.nome.replace(/'/g,"\'")}')" style="padding:9px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border)" onmouseenter="this.style.background='#f2f2f0'" onmouseleave="this.style.background=''">${x.nome}</div>`
  ).join('');
  dd.style.display = 'block';
}

function selecionarPrograma(id, nome) {
  document.getElementById('ex-prog-dropdown').style.display = 'none';
  document.getElementById('ex-prog-input').value = '';
  // Evita duplicatas
  if (progsSelecionados.find(p => p.nome === nome)) return;
  progsSelecionados.push({id, nome});
  renderProgTags();
  // Compatibilidade com código existente (usa o primeiro)
  S.progNm = progsSelecionados.map(p => p.nome).join(', ');
  S.progId = progsSelecionados[0]?.id || '';
  document.getElementById('ex-prog-sel').value = S.progId;
}

function renderProgTags() {
  const container = document.getElementById('prog-tags');
  if (!container) return;
  container.innerHTML = progsSelecionados.map((p, i) =>
    `<span class="prog-tag" onclick="removerProg(${{i}})" title="Clique para remover">${{p.nome}} x</span>`
  ).join('');
}

function removerProg(i) {
  progsSelecionados.splice(i, 1);
  renderProgTags();
  S.progNm = progsSelecionados.map(p => p.nome).join(', ');
  S.progId = progsSelecionados[0]?.id || '';
  document.getElementById('ex-prog-sel').value = S.progId;
}

document.addEventListener('click', e => {
  if (!e.target.closest('#ex-inst-input') && !e.target.closest('#ex-inst-dropdown'))
    document.getElementById('ex-inst-dropdown').style.display = 'none';
  if (!e.target.closest('#ex-prog-input') && !e.target.closest('#ex-prog-dropdown'))
    document.getElementById('ex-prog-dropdown').style.display = 'none';
});

// Pesquisar
async function pesquisar() {
  const medico = document.getElementById('ex-medico').value.trim();
  const crm    = document.getElementById('ex-crm').value.trim();
  const cert   = document.getElementById('ex-cert').value.trim();
  const ocorr  = document.getElementById('ex-ocorr').value;
  const uf     = document.getElementById('ex-uf').value;
  const ini    = document.getElementById('ex-ini').value;
  const fim    = document.getElementById('ex-fim').value;
  const inst   = document.getElementById('ex-inst-sel').value || '';
  const prog   = document.getElementById('ex-prog-sel').value || '';
  const instNm = inst ? (document.getElementById('ex-inst-input')?.value || S.instNm || '') : '';
  const progNm = prog ? (document.getElementById('ex-prog-input')?.value || S.progNm || '') : '';

  const hintNome = document.getElementById('hint-nome');
  if (hintNome) hintNome.style.display = (medico && !inst) ? 'block' : 'none';

  if (!medico && !crm && !cert && !ocorr && !inst && !S.progNm) {
    alert('Preencha ao menos um campo para pesquisar.');
    return;
  }

  // Reset
  filtroInstAtivo = false;
  rowsOriginal = [];
  Object.keys(crmMulti).forEach(k => delete crmMulti[k]);
  Object.keys(crmCache).forEach(k => delete crmCache[k]);
  Object.keys(contatoCache).forEach(k => delete contatoCache[k]);
  multiRows = {};
  telBuscandoTotal = 0; telBuscandoConcluido = 0;
  document.querySelectorAll('#stat-multi,#stat-tel').forEach(el => el.remove());
  document.getElementById('tb-ex').innerHTML = '';
  document.getElementById('th-ex').innerHTML = '';
  document.getElementById('stats').innerHTML = '';
  document.getElementById('res-ex').classList.add('hidden');
  document.getElementById('btn-xl').classList.add('hidden');
  document.getElementById('btn-filtro-inst').classList.add('hidden');
  document.getElementById('btn-filtro-inst').classList.remove('on');
  document.getElementById('btn-filtro-inst').disabled = true;
  document.getElementById('btn-filtro-inst').style.opacity = '.4';
  document.getElementById('btn-limpar-res').style.display = 'none';
  document.getElementById('log').style.display = 'none';
  document.getElementById('log').innerHTML = '';
  document.getElementById('btn-ex').disabled = true;
  document.getElementById('sp-ex').classList.remove('hidden');
  document.getElementById('log').innerHTML = 'Conectando ao servidor';
  document.getElementById('log').style.display = 'block';
  document.getElementById('log').style.background = '#f0f4f8';
  document.getElementById('log').style.borderColor = '#c0d0dc';
  document.getElementById('log').style.color = 'var(--muted)';

  try { await fetch(`${API}/`, {signal: AbortSignal.timeout(60000)}); } catch(e) {}
  document.getElementById('log').style.display = 'none';
  document.getElementById('log').style.background = '';
  document.getElementById('log').style.borderColor = '';
  document.getElementById('log').style.color = '';

  // Múltiplos programas selecionados sem instituição
  if (!inst && progsSelecionados.length > 0 && !document.getElementById('ex-inst-sel').value) {
    const todosOsCombos = progsSelecionados.flatMap(p =>
      p.id === '__uf__' ? (_prog_combos[p.nome] || []) : []
    );
    if (todosOsCombos.length > 0) {
      await pesquisarPorCombos(S.progNm, todosOsCombos, medico, crm, cert, ocorr, ini ? fmt(ini) : '', fim ? fmt(fim) : '');
      return;
    }
  }
  if (!inst && !prog && S.progNm && _prog_combos[S.progNm]) {
    await pesquisarPorCombos(S.progNm, _prog_combos[S.progNm], medico, crm, cert, ocorr, ini ? fmt(ini) : '', fim ? fmt(fim) : '');
    return;
  }

  const params = new URLSearchParams();
  if (uf) params.set('uf', uf);
  if (inst) params.set('inst', inst);
  if (prog) params.set('prog', prog);
  if (ini && fim) { params.set('ini', fmt(ini)); params.set('fim', fmt(fim)); }
  if (ocorr) params.set('ocorr', fmt(ocorr));
  if (medico) params.set('medico', medico.toUpperCase());
  if (crm) params.set('crm', crm);
  if (cert) params.set('cert', cert);

  try {
    const res  = await fetch(`${API}/certificados?${params.toString()}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (data.total === 0) {
      document.getElementById('log').innerHTML = 'Nenhum certificado encontrado para os filtros informados.';
      document.getElementById('log').style.display = 'block';
    }
    rows = data.dados;
    renderTabela(data.dados, instNm, progNm);
  } catch(e) {
    document.getElementById('log').innerHTML = `Erro: ${e.message}`;
    document.getElementById('log').style.display = 'block';
  } finally {
    document.getElementById('btn-ex').disabled = false;
    document.getElementById('sp-ex').classList.add('hidden');
  }
}

async function pesquisarPorCombos(progNm, combos, medico, crm, cert, ocorr, ini, fim) {
  const BATCH = 20, TIMEOUT = 8000;
  let todos = [];
  const dedup = new Set();
  const fetchT = (url) => {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), TIMEOUT);
    return fetch(url, {signal: ctrl.signal}).then(r => r.json()).catch(() => ({dados:[]})).finally(() => clearTimeout(t));
  };
  for (let i = 0; i < combos.length; i += BATCH) {
    const lote = combos.slice(i, i + BATCH);
    const res = await Promise.all(lote.map(({inst_id, prog_id}) => {
      const p = new URLSearchParams();
      p.set('inst', inst_id); p.set('prog', prog_id);
      if (medico) p.set('medico', medico);
      if (crm) p.set('crm', crm);
      if (cert) p.set('cert', cert);
      if (ocorr) p.set('ocorr', ocorr);
      if (ini) p.set('ini', ini);
      if (fim) p.set('fim', fim);
      return fetchT(`${API}/certificados?${p.toString()}`);
    }));
    res.forEach(d => {
      (d.dados||[]).forEach(r => {
        const k = (r['Nº Certificado']||'') + (r['CRM']||'');
        if (!dedup.has(k)) { dedup.add(k); todos.push(r); }
      });
    });
  }
  rows = todos;
  renderTabela(todos, '', progNm);
  document.getElementById('btn-filtro-inst').classList.add('hidden');
  if (todos.length === 0) {
    document.getElementById('log').innerHTML = 'Nenhum certificado encontrado para os filtros informados.';
    document.getElementById('log').style.display = 'block';
  }
  document.getElementById('btn-ex').disabled = false;
  document.getElementById('sp-ex').classList.add('hidden');
}

// Render
function renderTabela(d, instNm, progNm) {
  if (!d.length) return;
  rowsOriginal = [...d];
  const cols = COLS_FIXAS.filter(c => d[0] && c in d[0]);
  const colsExibir = [...cols, 'Telefone', 'Email'];
  const extra = [];
  if (instNm) extra.push(`<div class="stat" style="flex:2"><div class="stat-v" style="font-size:13px">${instNm}</div><div class="stat-l">${progNm||'Todos os programas'}</div></div>`);
  document.getElementById('stats').innerHTML =
    `<div class="stat"><div class="stat-v">${d.length}</div><div class="stat-l">Certificados</div></div>` + extra.join('');
  document.getElementById('th-ex').innerHTML = colsExibir.map(c => `<th>${labelCol(c)}</th>`).join('');
  document.getElementById('tb-ex').innerHTML = d.map((r, i) => {
    const crm = r['CRM'] || '';
    const cache = contatoCache[crm] || {};
    const tds = colsExibir.map(c => {
      if (c === 'CRM') return `<td style="white-space:nowrap"><span id="bdg-${i}" data-crm="${crm}"></span>${crm}</td>`;
      if (c === 'Telefone') return `<td id="tel-${i}" class="tel-cell">${cache.telefone||''}</td>`;
      if (c === 'Email') return `<td id="eml-${i}" style="font-size:11px">${cache.email||''}</td>`;
      return `<td>${r[c]??''}</td>`;
    });
    return `<tr>${tds.join('')}</tr>`;
  }).join('');
  document.getElementById('res-ex').classList.remove('hidden');
  document.getElementById('btn-xl').classList.remove('hidden');
  document.getElementById('btn-sem-tel').classList.remove('hidden');
  document.getElementById('btn-limpar-res').style.display = '';
  if (document.getElementById('ex-inst-sel').value)
    document.getElementById('btn-filtro-inst').classList.remove('hidden');
  if (didEmail && didSenha) buscarContatosAuto(d);
  multiRows = {};
  crmVerificandoTotal = 0; crmVerificandoConcluido = 0;
  const crmsVistos = {};
  d.forEach((r, i) => { const c = r['CRM']; if (!c) return; if (!crmsVistos[c]) crmsVistos[c]=[]; crmsVistos[c].push(i); });
  crmVerificandoTotal = Object.keys(crmsVistos).length;
  if (crmVerificandoTotal === 0) { finalizarStatMulti(); return; }
  Object.entries(crmsVistos).forEach(([crm, indices]) => verificarMultiCRM(crm, indices));
}

function renderTabelaDados(d) {
  const cols = COLS_FIXAS.filter(c => (rowsOriginal[0]||{}) && c in (rowsOriginal[0]||{}));
  const colsExibir = [...cols, 'Telefone', 'Email'];
  document.getElementById('tb-ex').innerHTML = d.map((r, i) => {
    const crm = r['CRM'] || '';
    const cache = contatoCache[crm] || {};
    const tds = colsExibir.map(c => {
      if (c === 'CRM') return `<td style="white-space:nowrap"><span id="bdg-${i}" data-crm="${crm}"></span>${crm}</td>`;
      if (c === 'Telefone') return `<td id="tel-${i}" class="tel-cell">${cache.telefone||''}</td>`;
      if (c === 'Email') return `<td id="eml-${i}" style="font-size:11px">${cache.email||''}</td>`;
      return `<td>${r[c]??''}</td>`;
    });
    return `<tr>${tds.join('')}</tr>`;
  }).join('');
  d.forEach((r, i) => { const crm = r['CRM']||''; if (crmMulti[crm]) colocarBadge(crm, [i], crmMulti[crm]); });
  const statEl = document.querySelector('#stats .stat');
  if (statEl) statEl.innerHTML = `<div class="stat-v">${d.length}</div><div class="stat-l">Certificados</div>`;
}

// Multi-cert
async function verificarMultiCRM(crm, indices) {
  if (!crm) return;
  if (crmMulti[crm]) colocarBadge(crm, indices, crmMulti[crm]);
  else {
    try {
      const r = await fetch(`${API}/contar?crm=${encodeURIComponent(crm)}`);
      const data = await r.json();
      if ((data.total||0) > 1) { crmMulti[crm] = data.total; colocarBadge(crm, indices, data.total); atualizarStatMulti(); }
    } catch(e) {}
  }
  crmVerificandoConcluido++;
  if (crmVerificandoConcluido >= crmVerificandoTotal) finalizarStatMulti();
}

function colocarBadge(crm, indices, total) {
  indices.forEach(i => {
    const el = document.getElementById(`bdg-${i}`);
    if (el) { const safe = crm.replace(/'/g,"\\'"); el.innerHTML = `<span class="badge-m" title="${total} certificações" onclick="abrirModalCRM('${safe}')"></span>`; }
  });
}

function atualizarStatMulti() {
  const total = Object.keys(crmMulti).length;
  const statsEl = document.getElementById('stats');
  document.querySelectorAll('#stat-multi').forEach(el => el.remove());
  const s = document.createElement('div'); s.className='stat'; s.id='stat-multi';
  s.innerHTML = `<div class="stat-v" style="color:var(--gold)">${total} <span id="spin-multi" class="spin-css dark" style="width:10px;height:10px;border-width:1.5px"></span></div><div class="stat-l">Múltiplos Cert.</div>`;
  statsEl.appendChild(s);
}

function finalizarStatMulti() {
  const el = document.getElementById('spin-multi');
  if (el) el.outerHTML = '<span style="font-size:11px;color:var(--green)">ok</span>';
  const btn = document.getElementById('btn-filtro-inst');
  if (btn) { btn.disabled=false; btn.style.opacity=''; btn.style.cursor=''; }
}

// Modal
async function abrirModalCRM(crm) {
  document.getElementById('modal-nome').textContent = 'Carregando';
  document.getElementById('modal-crm').textContent = `CRM: ${crm}`;
  document.getElementById('modal-certs').innerHTML = '<div style="color:var(--muted);font-size:12px;padding:20px 0">Buscando certificações</div>';
  document.getElementById('modal-medico').classList.add('open');
  if (!crmCache[crm]) {
    try {
      const r = await fetch(`${API}/certificados?crm=${encodeURIComponent(crm)}`);
      const data = await r.json();
      crmCache[crm] = data.dados || [];
      if (crmCache[crm].length > 1) multiRows[crm] = crmCache[crm];
    } catch(e) { document.getElementById('modal-certs').innerHTML = '<div style="color:var(--red)">Erro ao carregar.</div>'; return; }
  }
  const certs = crmCache[crm];
  if (!certs.length) return;
  document.getElementById('modal-nome').textContent = certs[0]['Médico'] || crm;
  document.getElementById('modal-crm').textContent = `CRM: ${crm} — ${certs.length} certificação(ões)`;
  const keys = Object.keys(certs[0]);
  const kNum=keys.find(k=>k==='Nº Certificado')||'';
  const kInst=keys.find(k=>k==='Instituição')||'';
  const kProg=keys.find(k=>k==='Programa')||'';
  const kIni=keys.find(k=>k==='Início')||'';
  const kTerm=keys.find(k=>k==='Término')||'';
  const kEmiss=keys.find(k=>k==='Emissão do Certificado')||'';
  const kObs=keys.find(k=>k==='Informações Adicionais')||'';
  document.getElementById('modal-certs').innerHTML = certs.map((c,i) => `
    <div class="cert-card">
      <div class="cert-num">Certificado ${i+1}</div>
      <table style="width:100%;font-size:12px;border-collapse:collapse;margin-top:6px">
        <tr>
          <td style="color:var(--muted);padding:3px 16px 3px 0;width:55%;vertical-align:top">${kNum?`Número <b style="color:var(--text);font-weight:600">${c[kNum]||'—'}</b>`:''}</td>
          <td style="color:var(--muted);padding:3px 0;vertical-align:top">${kIni?`Início <b style="color:var(--text);font-weight:600">${c[kIni]||'—'}</b>`:''}</td>
        </tr>
        <tr>
          <td style="color:var(--muted);padding:3px 16px 3px 0;vertical-align:top">${kInst?`Instituição <b style="color:var(--text);font-weight:600">${c[kInst]||'—'}</b>`:''}</td>
          <td style="color:var(--muted);padding:3px 0;vertical-align:top">${kTerm?`Término <b style="color:var(--text);font-weight:600">${c[kTerm]||'—'}</b>`:''}</td>
        </tr>
        <tr>
          <td style="color:var(--muted);padding:3px 16px 3px 0;vertical-align:top">${kProg?`Programa <b style="color:var(--text);font-weight:600">${c[kProg]||'—'}</b>`:''}</td>
          <td style="color:var(--muted);padding:3px 0;vertical-align:top">${kEmiss?`Emissão <b style="color:var(--text);font-weight:600">${c[kEmiss]||'—'}</b>`:''}</td>
        </tr>
        ${kObs&&c[kObs]?`<tr><td colspan="2" style="color:var(--muted);padding:6px 0 0">Observações <span style="color:var(--text)">${c[kObs]}</span></td></tr>`:''}
      </table>
    </div>`).join('');
}

function fecharModal() { document.getElementById('modal-medico').classList.remove('open'); }

// Ocultar sem telefone
let semTelAtivo = false;
function toggleSemTel() {
  semTelAtivo = !semTelAtivo;
  const btn = document.getElementById('btn-sem-tel');
  btn.classList.toggle('on', semTelAtivo);
  if (semTelAtivo) {
    const filtradas = rows.filter(r => {
      const c = contatoCache[r['CRM']||''];
      return c && c.telefone;
    });
    renderTabelaDados(filtradas);
  } else {
    renderTabelaDados(rows);
  }
}

// Filtro última inst
async function toggleFiltroInst() {
  filtroInstAtivo = !filtroInstAtivo;
  const btn = document.getElementById('btn-filtro-inst');
  btn.classList.toggle('on', filtroInstAtivo);
  if (!filtroInstAtivo) { rows = [...rowsOriginal]; renderTabelaDados(rows); return; }
  btn.querySelector('.toggle-track').style.background = 'var(--muted)';
  btn.disabled = true;
  const crmsParaBuscar = [...new Set(rowsOriginal.map(r => r['CRM']).filter(c => c && crmMulti[c] && !crmCache[c]))];
  await Promise.all(crmsParaBuscar.map(async crm => {
    try { const r = await fetch(`${API}/certificados?crm=${encodeURIComponent(crm)}`); const d = await r.json(); crmCache[crm] = d.dados||[]; } catch(e) {}
  }));
  const instAtual = rowsOriginal[0]?.['Instituição'] || '';
  const filtradas = rowsOriginal.filter(r => {
    const crm = r['CRM']||'';
    if (!crmMulti[crm]) return true;
    const todos = crmCache[crm]||[];
    if (!todos.length) return true;
    const recente = todos.reduce((a,b) => parseDateBR(a['Emissão do Certificado']) >= parseDateBR(b['Emissão do Certificado']) ? a : b);
    return (recente['Instituição']||'') === instAtual;
  });
  rows = filtradas; renderTabelaDados(rows);
  btn.querySelector('.toggle-track').style.background = '';
  btn.disabled = false;
}

// XLSX
function exportXL() {
  if (!rows.length) return;
  if (!window.XLSX) { const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'; s.onload=_xl; document.head.appendChild(s); }
  else _xl();
}

function _xl() {
  const wb = XLSX.utils.book_new();
  const COLS_XL = ['Nº Certificado','Médico','CRM','Programa','Instituição','UF','Início','Término','Emissão do Certificado','Informações Adicionais','Múltiplas Formações','Total Certificações','Telefone','Email'];
  const enriched = rows.map(r => {
    const crm = r['CRM']||'';
    const total = crmMulti[crm]||1;
    const contato = contatoCache[crm] || {};
    const obj = {};
    COLS_XL.forEach(col => {
      if (col === 'Múltiplas Formações') obj[col] = total > 1 ? 'SIM' : 'NÃO';
      else if (col === 'Total Certificações') obj[col] = total;
      else if (col === 'Telefone') obj[col] = contato.telefone || '';
      else if (col === 'Email') obj[col] = contato.email || '';
      else obj[col] = r[col] ?? '';
    });
    return obj;
  });
  const ws1 = XLSX.utils.json_to_sheet(enriched, {header: COLS_XL});
  XLSX.utils.book_append_sheet(wb, ws1, 'Certificados');
  XLSX.writeFile(wb, `certificados_${Date.now()}.xlsx`);
}

// Modo escuro
function toggleDark() {
  document.body.classList.toggle('dark');
  const btn = document.getElementById('btn-dark');
  const on = document.body.classList.contains('dark');
  btn.textContent = on ? 'Modo Claro' : 'Modo Escuro';
  localStorage.setItem('dark', on ? '1' : '0');
}
if (localStorage.getItem('dark') === '1') {
  document.body.classList.add('dark');
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('btn-dark');
    if (btn) btn.textContent = 'Modo Claro';
  });
}

// Senha
async function verificarSenha() {
  const senha = document.getElementById('senha-input').value;
  const encoder = new TextEncoder();
  const data = encoder.encode(senha);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
  const p1="bf5af652864726d0",p2="ee31246e7e7b2feb",p3="cb0bb8d625132",p4="4b990d8c5ab2e9aa7bd";
  if (hashHex === p1+p2+p3+p4) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    sessionStorage.setItem('auth','1');
  } else {
    document.getElementById('senha-erro').style.display = 'block';
    document.getElementById('senha-input').value = '';
    document.getElementById('senha-input').focus();
  }
}

if (sessionStorage.getItem('auth')==='1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-content').style.display = 'block';
}

document.addEventListener('DOMContentLoaded', function() {
  const e = localStorage.getItem('did_email');
  const s = localStorage.getItem('did_senha');
  if (e && s) {
    didEmail=e; didSenha=s;
    const emailEl=document.getElementById('did-email');
    const senhaEl=document.getElementById('did-senha');
    if (emailEl) emailEl.value=e;
    if (senhaEl) senhaEl.value=s;
    document.getElementById('doctorid-status').textContent = 'Configurado';
    document.getElementById('did-dot').classList.add('on');
  }
});

document.querySelectorAll('input[type="date"]').forEach(inp => {
  inp.addEventListener('change', function() { this.style.color = this.value ? 'var(--text)' : ''; });
});
